# Cargo Deny Configuration
# For full documentation: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
# Ignored advisories with documented reasons
# Review periodically (recommended: quarterly)
ignore = [
    # RUSTSEC-2023-0071: RSA Marvin Attack
    # Severity: medium | Date: 2023-11-22
    # Affected: rsa crate v0.9.10
    # Dependency path: easyssh-core[pro>sso] -> openidconnect -> rsa
    # Reason: openidconnect requires RSA for JWT signature verification
    # Impact: Medium - only affects Pro users using OIDC/OAuth2 SSO
    # Mitigation:
    #   1. Use SAML SSO instead (saml-sso feature)
    #   2. Disable oidc-sso feature if OIDC not needed
    #   3. RSA only for JWT verification, not key generation/encryption
    # Action: Monitor https://github.com/RustCrypto/RSA/issues/19 for fix
    #         Monitor openidconnect releases for RSA replacement
    # Fixed: 2026-04-03 - Removed unused sqlx-mysql, RSA now only from openidconnect
    "RUSTSEC-2023-0071",

    # RUSTSEC-2024-0388: derivative is unmaintained
    # Severity: low | Date: 2024-06-26
    # Affected: derivative crate
    # Dependency path: egui -> zbus -> derivative (accessibility)
    # Reason: Transitive dependency from egui accessibility stack, cannot control
    # Impact: Low - only used in debug/accessibility builds
    # Action: Monitor egui/zbus updates for derivative replacement
    "RUSTSEC-2024-0388",

    # RUSTSEC-2025-0057: fxhash is unmaintained
    # Severity: low | Date: 2025-09-05
    # Affected: fxhash crate
    # Dependency path: tao/wry WebView stack
    # Reason: Transitive dependency, cannot directly control
    # Impact: Low - non-core functionality
    # Action: Monitor tao/wry updates for hash function replacement
    "RUSTSEC-2025-0057",

    # RUSTSEC-2024-0384: instant is unmaintained
    # Severity: low | Date: 2024-09-01
    # Affected: instant crate
    # Dependency path: parking_lot_core -> parking_lot -> reed-solomon-erasure
    #                  Also: futures-lite -> atspi/accesskit (egui accessibility)
    # Reason: Transitive dependency, no maintained alternative for parking_lot 0.11.x
    # Impact: Low - only affects WASM target in original intent, unused on native
    # Action: Monitor parking_lot updates, reed-solomon-erasure for migration
    "RUSTSEC-2024-0384",

    # RUSTSEC-2024-0436: paste is unmaintained
    # Severity: low | Date: 2024-10-07
    # Affected: paste crate
    # Dependency path: metal -> wgpu-hal -> wgpu (egui rendering)
    #                  Also: azure_core, accesskit_windows
    # Reason: Transitive dependency from GPU and Azure SDK
    # Impact: Low - procedural macro crate, no runtime impact
    # Action: Monitor wgpu and azure SDK updates
    "RUSTSEC-2024-0436",

    # RUSTSEC-2024-0370: proc-macro-error is unmaintained
    # Severity: low | Date: 2024-09-01
    # Affected: proc-macro-error crate
    # Dependency path: utoipa-gen -> utoipa (API documentation)
    # Reason: Transitive dependency from utoipa for OpenAPI generation
    # Impact: Low - only affects pro-server build, compile-time only
    # Action: Monitor utoipa updates for proc-macro-error replacement
    "RUSTSEC-2024-0370",

    # RUSTSEC-2025-0134: rustls-pemfile is unmaintained
    # Severity: low | Date: 2025-11-28
    # Affected: rustls-pemfile 1.x
    # Dependency path: rustls-native-certs -> hyper-rustls -> kube-client, aws-sdk
    # Reason: Transitive dependency from Kubernetes and AWS SDKs
    # Impact: Low - PEM file parsing, superseded by rustls-pemfile 2.x
    # Action: Monitor kube and aws-sdk updates for migration
    "RUSTSEC-2025-0134",

    # RUSTSEC-2017-0008: serial crate is unmaintained
    # Severity: low | Date: 2017-07-02
    # Affected: serial crate 0.4.0
    # Dependency path: portable-pty -> serial
    # Reason: Transitive dependency from portable-pty for PTY support
    # Impact: Low - serial port functionality not used in SSH client
    # Action: Monitor portable-pty updates for serial replacement
    "RUSTSEC-2017-0008",

    # RUSTSEC-2024-0429: glib Iterator unsoundness
    # Severity: medium | Date: 2024-03-30
    # Affected: glib 0.19.x (GTK4 dependency)
    # Dependency path: gtk4 -> glib (Linux UI)
    # Reason: GTK4 upstream issue, fixed in newer glib versions
    # Impact: Low - affects only Linux GTK4 builds, iterator edge case
    # Action: Update gtk4 crate when available, monitor glib-rs updates
    "RUSTSEC-2024-0429",

    # RUSTSEC-2026-0002: lru IterMut unsoundness
    # Severity: medium | Date: 2026-01-07
    # Affected: lru 0.12.x
    # Dependency path: aws-sdk-s3 -> lru
    # Reason: Transitive dependency from AWS S3 SDK
    # Impact: Low - only affects mutable iteration, not used in our code
    # Action: Monitor aws-sdk-s3 updates for lru fix
    "RUSTSEC-2026-0002",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "BSL-1.0",
    "Zlib",
    "OFL-1.1",
    "LicenseRef-UFL-1.0",
    "0BSD",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [
    { path = "LICENSE", hash = 0x001c7e6c }
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
