version: '3.8'

services:
  pro-server:
    build:
      context: ..
      dockerfile: pro-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DATABASE_URL=postgres://easyssh:easyssh@postgres:5432/easyssh
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=easyssh
      - POSTGRES_PASSWORD=easyssh
      - POSTGRES_DB=easyssh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data: