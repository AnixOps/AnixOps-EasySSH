          echo "- SSH configuration management" >> release_notes.md
          echo "- Password and key-based authentication" >> release_notes.md
          echo "- Server grouping" >> release_notes.md
          echo "- Secure credential storage via OS keychain" >> release_notes.md
          echo "- Encrypted configuration storage" >> release_notes.md
          echo "" >> release_notes.md
