name: Code Signing

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to sign'
        required: true
        type: string

jobs:
  sign-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build-${{ inputs.version }}
          path: ./artifacts

      - name: Setup Azure Key Vault
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download certificate
        run: |
          az keyvault secret download --name code-signing-cert --vault-name easyssh-kv --file cert.pfx

      - name: Sign Windows executable
        run: |
          $cert = Get-PfxCertificate -FilePath cert.pfx -Password (ConvertTo-SecureString -String "${{ secrets.CERT_PASSWORD }}" -AsPlainText -Force)
          Get-ChildItem ./artifacts -Recurse -Include "*.exe" | ForEach-Object {
            Set-AuthenticodeSignature -FilePath $_.FullName -Certificate $cert -TimestampServer "http://timestamp.digicert.com"
          }

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-signed-${{ inputs.version }}
          path: ./artifacts

  sign-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build-${{ inputs.version }}
          path: ./artifacts

      - name: Import signing certificate
        run: |
          echo "${{ secrets.MACOS_CERTIFICATE }}" | base64 --decode > certificate.p12
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import certificate.p12 -k build.keychain -P "${{ secrets.MACOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain

      - name: Sign macOS app
        run: |
          codesign --force --options runtime --sign "${{ secrets.MACOS_IDENTITY }}" --deep --strict ./artifacts/EasySSH.app

      - name: Notarize
        run: |
          xcrun notarytool submit ./artifacts/EasySSH.app --apple-id "${{ secrets.MACOS_APPLE_ID }}" --team-id "${{ secrets.MACOS_TEAM_ID }}" --password "${{ secrets.MACOS_NOTARIZATION_PASSWORD }}" --wait

      - name: Staple
        run: |
          xcrun stapler staple ./artifacts/EasySSH.app

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-signed-${{ inputs.version }}
          path: ./artifacts
