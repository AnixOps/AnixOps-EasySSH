codecov:
  notify:
    require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: error
        informational: false
    patch:
      default:
        target: auto
        threshold: 0%
        if_ci_failed: error
        informational: false
    changes:
      default:
        target: auto
        if_ci_failed: error

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: no
  require_head: no
  require_base: no

flags:
  core:
    paths:
      - core/src/
    carryforward: true
  windows:
    paths:
      - platforms/windows/
    carryforward: true
  linux:
    paths:
      - platforms/linux/
    carryforward: true
  macos:
    paths:
      - platforms/macos/
    carryforward: true
  tui:
    paths:
      - tui/src/
    carryforward: true
