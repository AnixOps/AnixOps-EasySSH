name: Canary Release Pipeline

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      percentage:
        required: false
        type: number
        default: 5
  workflow_dispatch:
    inputs:
      percentage:
        description: 'Rollout percentage (0-100)'
        required: false
        default: '5'
      skip_health_check:
        description: 'Skip health check'
        type: boolean
        default: false

env:
  CANARY_ENDPOINT: ${{ secrets.CANARY_ENDPOINT }}
  CANARY_API_KEY: ${{ secrets.CANARY_API_KEY }}

jobs:
  # ============================================================================
  # Prepare Canary Release
  # ============================================================================
  prepare-canary:
    name: Prepare Canary Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download Release Package
        uses: actions/download-artifact@v8
        with:
          name: release-package
          path: release

      - name: Validate Artifacts
        run: |
          echo "Validating canary artifacts..."

          # Check all platforms are present
          for platform in windows linux macos; do
            if [ ! -d "release/$platform" ]; then
              echo "Warning: Missing $platform artifacts"
            fi
          done

          # Verify checksums
          if [ -f release/SHA256SUMS ]; then
            cd release && sha256sum -c SHA256SUMS || true
          fi

      - name: Create Canary Manifest
        run: |
          VERSION="${{ inputs.version }}"
          PERCENTAGE="${{ inputs.percentage }}"

          cat > canary-manifest.json << EOF
          {
            "version": "$VERSION",
            "channel": "canary",
            "rollout_percentage": $PERCENTAGE,
            "release_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "supported_platforms": ["windows-x64", "linux-x64", "macos-x64", "macos-arm64"],
            "artifacts": {
              "windows-x64": {
                "url": "https://github.com/anixops/easyssh/releases/download/canary/EasySSH-$VERSION-windows-x64.exe",
                "size": $(stat -c%s release/windows/EasySSH.exe 2>/dev/null || echo 0),
                "required": false
              },
              "linux-x64": {
                "url": "https://github.com/anixops/easyssh/releases/download/canary/EasySSH-$VERSION-linux-x64.AppImage",
                "size": $(stat -c%s release/linux/amd64/*.AppImage 2>/dev/null || echo 0),
                "required": false
              },
              "macos-x64": {
                "url": "https://github.com/anixops/easyssh/releases/download/canary/EasySSH-$VERSION-macos-x64.dmg",
                "size": $(stat -c%s release/macos/*.dmg 2>/dev/null || echo 0),
                "required": false
              },
              "macos-arm64": {
                "url": "https://github.com/anixops/easyssh/releases/download/canary/EasySSH-$VERSION-macos-arm64.dmg",
                "size": $(stat -c%s release/macos/*.dmg 2>/dev/null || echo 0),
                "required": false
              }
            },
            "rollout_config": {
              "start_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "end_time": null,
              "auto_promote": false,
              "auto_rollback": true,
              "rollback_threshold": 0.05
            },
            "metadata": {
              "git_commit": "${{ github.sha }}",
              "build_number": "${{ github.run_number }}",
              "prerelease": true
            }
          }
          EOF

          cat canary-manifest.json

      - name: Upload Canary Manifest
        uses: actions/upload-artifact@v7
        with:
          name: canary-manifest
          path: canary-manifest.json

  # ============================================================================
  # Deploy to Canary Channel
  # ============================================================================
  deploy-canary:
    name: Deploy to Canary
    runs-on: ubuntu-latest
    needs: prepare-canary
    environment: canary

    steps:
      - uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Deploy to Canary Server
        run: |
          echo "Deploying canary release..."
          VERSION="${{ inputs.version }}"

          # Upload to canary distribution
          # curl -X POST "$CANARY_ENDPOINT/releases" \
          #   -H "Authorization: Bearer $CANARY_API_KEY" \
          #   -H "Content-Type: application/json" \
          #   -d @artifacts/canary-manifest/canary-manifest.json

          # Upload artifacts
          for file in artifacts/release-package/*; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              # curl -X POST "$CANARY_ENDPOINT/artifacts" \
              #   -H "Authorization: Bearer $CANARY_API_KEY" \
              #   -F "file=@$file" \
              #   -F "version=$VERSION" \
              #   -F "channel=canary"
            fi
          done

      - name: Update Channel
        run: |
          echo "Updating canary channel to version ${{ inputs.version }}"

          # Update channel configuration
          cat > channel-update.json << EOF
          {
            "channel": "canary",
            "version": "${{ inputs.version }}",
            "percentage": ${{ inputs.percentage }},
            "manifest_url": "https://github.com/anixops/easyssh/releases/download/canary/canary-manifest.json"
          }
          EOF

          # curl -X PUT "$CANARY_ENDPOINT/channels/canary" \
          #   -H "Authorization: Bearer $CANARY_API_KEY" \
          #   -H "Content-Type: application/json" \
          #   -d @channel-update.json

  # ============================================================================
  # Health Check & Monitoring
  # ============================================================================
  health-check:
    name: Canary Health Check
    runs-on: ubuntu-latest
    needs: deploy-canary
    if: ${{ !inputs.skip_health_check }}

    steps:
      - name: Wait for Deployment
        run: |
          echo "Waiting for canary deployment to propagate..."
          sleep 300  # 5 minutes

      - name: Run Health Checks
        run: |
          echo "Running health checks for canary..."

          # Check error rates
          # Check crash rates
          # Check performance metrics

          HEALTHY=true

          # Query canary metrics
          # ERROR_RATE=$(curl -s "$CANARY_ENDPOINT/metrics/error-rate?channel=canary&version=${{ inputs.version }}")
          # CRASH_RATE=$(curl -s "$CANARY_ENDPOINT/metrics/crash-rate?channel=canary&version=${{ inputs.version }}")

          # Thresholds
          MAX_ERROR_RATE=0.01  # 1%
          MAX_CRASH_RATE=0.001  # 0.1%

          # if (( $(echo "$ERROR_RATE > $MAX_ERROR_RATE" | bc -l) )); then
          #   echo "Error rate too high: $ERROR_RATE"
          #   HEALTHY=false
          # fi

          # if (( $(echo "$CRASH_RATE > $MAX_CRASH_RATE" | bc -l) )); then
          #   echo "Crash rate too high: $CRASH_RATE"
          #   HEALTHY=false
          # fi

          if [ "$HEALTHY" = false ]; then
            echo "❌ Health check failed - triggering rollback"
            exit 1
          fi

          echo "✅ Health check passed"

      - name: Continue Monitoring
        run: |
          echo "Scheduling continued monitoring..."
          # Could trigger another workflow for extended monitoring

  # ============================================================================
  # Rollback on Failure
  # ============================================================================
  rollback:
    name: Rollback Canary
    runs-on: ubuntu-latest
    needs: [deploy-canary, health-check]
    if: failure() && needs.deploy-canary.result == 'success'

    steps:
      - name: Trigger Rollback
        run: |
          echo "Rolling back canary release..."

          # Get previous stable version
          # PREVIOUS_VERSION=$(curl -s "$CANARY_ENDPOINT/channels/stable/latest")

          # Update canary to point to previous version
          # curl -X PUT "$CANARY_ENDPOINT/channels/canary" \
          #   -H "Authorization: Bearer $CANARY_API_KEY" \
          #   -d '{"version": "'$PREVIOUS_VERSION'"}'

          # Notify
          echo "Canary rolled back to previous version"

      - name: Create Rollback Issue
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Canary Rollback: ${{ inputs.version }}`,
              body: `Automatic rollback triggered for canary version ${{ inputs.version }} due to health check failure.

              - Version: ${{ inputs.version }}
              - Commit: ${{ github.sha }}
              - Time: ${{ github.event.head_commit.timestamp }}

              Please investigate the issue before attempting another canary release.`,
              labels: ['canary', 'rollback', 'incident']
            });

      - name: Notify Team
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 Canary Rollback: ${{ inputs.version }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Canary Release Rolled Back"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Version: ${{ inputs.version }}\nCommit: ${{ github.sha }}\nReason: Health check failure"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================================================
  # Promote to Stable
  # ============================================================================
  promote:
    name: Promote to Stable
    runs-on: ubuntu-latest
    needs: [deploy-canary, health-check]
    if: success()

    steps:
      - name: Check Promotion Criteria
        id: check
        run: |
          # Check if canary has been running successfully
          # CANARY_AGE=$(curl -s "$CANARY_ENDPOINT/releases/${{ inputs.version }}/age")
          # CANARY_ADOPTION=$(curl -s "$CANARY_ENDPOINT/releases/${{ inputs.version }}/adoption")

          # Minimum age: 24 hours
          # Minimum adoption: 100 users

          echo "canary_ready=false" >> $GITHUB_OUTPUT

          # if [ $CANARY_AGE -gt 86400 ] && [ $CANARY_ADOPTION -gt 100 ]; then
          #   echo "canary_ready=true" >> $GITHUB_OUTPUT
          # fi

      - name: Schedule Promotion
        if: steps.check.outputs.canary_ready == 'true'
        run: |
          echo "Canary is ready for promotion to stable"

          # Trigger promotion workflow
          # curl -X POST \
          #   -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          #   -d '{"ref":"main","inputs":{"version":"${{ inputs.version }}"}}' \
          #   https://api.github.com/repos/${{ github.repository }}/actions/workflows/promote.yml/dispatches

      - name: Report Status
        run: |
          echo "Canary release ${{ inputs.version }} is running successfully"
          echo "Current rollout: ${{ inputs.percentage }}%"
