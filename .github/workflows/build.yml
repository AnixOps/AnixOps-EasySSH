name: Multi-Platform Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==================== Core Library Build ====================
  build-core:
    name: Build Core Library
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Core (Release)
        run: cargo build --release -p easyssh-core

      - name: Run Tests
        run: cargo test --release -p easyssh-core

      - name: Clippy Check
        run: cargo clippy -p easyssh-core -- -D warnings

      - name: Upload Core Artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: easyssh-core-${{ matrix.os }}
          path: |
            target/release/libeasyssh_core.a
            target/release/libeasyssh_core.dylib
            target/release/libeasyssh_core.so
            core/target/include/easyssh_core.h
          if-no-files-found: warn

      - name: Upload Core Artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: easyssh-core-${{ matrix.os }}
          path: |
            target/release/easyssh_core.dll
            target/release/easyssh_core.dll.lib
            core/target/include/easyssh_core.h
          if-no-files-found: warn

  # ==================== TUI Build (All Platforms) ====================
  build-tui:
    name: Build TUI
    needs: build-core
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build TUI
        run: cargo build --release -p easyssh-tui

      - name: Test TUI CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          ./target/release/easyssh --version
          ./target/release/easyssh --help

      - name: Test TUI CLI (Windows)
        if: runner.os == 'Windows'
        run: |
          .\target\release\easyssh.exe --version
          .\target\release\easyssh.exe --help

      - name: Upload TUI Binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: easyssh-tui-${{ matrix.os }}
          path: target/release/easyssh
          if-no-files-found: warn

      - name: Upload TUI Binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: easyssh-tui-${{ matrix.os }}
          path: target/release/easyssh.exe
          if-no-files-found: warn

  # ==================== Linux GTK4 Build ====================
  build-linux-gtk4:
    name: Build Linux GTK4 App
    runs-on: ubuntu-latest
    needs: build-core

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config \
            build-essential \
            libglib2.0-dev \
            libgraphene-1.0-dev \
            libpango1.0-dev \
            libharfbuzz-dev \
            libcairo2-dev \
            libgdk-pixbuf2.0-dev \
            libgio-unix-2.0

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-gtk4-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build GTK4 App
        working-directory: platforms/linux/easyssh-gtk4
        run: cargo build --release

      - name: Upload GTK4 Binary
        uses: actions/upload-artifact@v4
        with:
          name: easyssh-gtk4-linux
          path: platforms/linux/easyssh-gtk4/target/release/easyssh
          if-no-files-found: warn

  # ==================== macOS Swift Build ====================
  build-macos-swift:
    name: Build macOS SwiftUI App
    runs-on: macos-latest
    needs: build-core

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Build Rust Core (Static Library)
        run: cargo build --release -p easyssh-core

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Swift Package
        working-directory: platforms/macos/EasySSH
        run: |
          # Create module map for FFI
          mkdir -p Sources/CEasySSHCore
          cat > Sources/CEasySSHCore/module.modulemap << 'EOF'
          module CEasySSHCore {
              header "../../../core/target/include/easyssh_core.h"
              export *
          }
          EOF

          # Show environment info
          swift --version
          xcodebuild -version

          # Build Swift package (allow failure for now)
          swift build || echo "Swift build may fail - macOS app development requires more setup"

      - name: Upload macOS Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-log
          path: |
            platforms/macos/EasySSH/.build/
            platforms/macos/EasySSH/Sources/CEasySSHCore/

  # ==================== Windows (Placeholder - Local Build Recommended) ====================
  build-windows-check:
    name: Check Windows Project
    runs-on: windows-latest
    needs: build-core

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Check Windows Project Structure
        run: |
          Write-Host "Windows project structure:"
          Get-ChildItem -Path platforms/windows/easyssh-winui -Recurse -Include *.rs, Cargo.toml

      - name: Note
        run: |
          Write-Host "================================================"
          Write-Host "Windows build should be done locally due to:"
          Write-Host "1. WinUI 3 requires Windows SDK"
          Write-Host "2. Visual Studio 2022 with C++ tools"
          Write-Host "3. Windows App SDK"
          Write-Host ""
          Write-Host "Local build instructions:"
          Write-Host "cd platforms/windows/easyssh-winui"
          Write-Host "cargo build --release"
          Write-Host "================================================"

  # ==================== Release ====================
  release:
    name: Create Release
    needs: [build-tui, build-linux-gtk4]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            easyssh-tui-*/*
            easyssh-gtk4-linux/*
          draft: true
          prerelease: true
          generate_release_notes: true
