# EasySSH D-Bus Service Configuration
# Install to: /usr/share/dbus-1/system.d/com.easyssh.Service.conf

<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="com.easyssh.Service"/>
    <allow send_destination="com.easyssh.Service"/>
    <allow receive_sender="com.easyssh.Service"/>
  </policy>

  <policy context="default">
    <allow send_destination="com.easyssh.Service"/>
    <allow receive_sender="com.easyssh.Service"/>
  </policy>
</busconfig>
