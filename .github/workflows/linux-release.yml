name: Linux Release

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to release'
        required: true
        type: string
      channel:
        description: 'Release channel (stable, beta, rc, alpha)'
        required: true
        type: string
        default: 'stable'
      build_arch:
        description: 'Architectures to build (comma-separated)'
        required: false
        type: string
        default: 'x86_64,aarch64'
      build_packages:
        description: 'Package formats to build (comma-separated)'
        required: false
        type: string
        default: 'appimage,deb,rpm,tarball'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.2.3)'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: false
        type: choice
        options:
          - stable
          - beta
          - rc
          - alpha
        default: 'stable'
      build_arch:
        description: 'Architectures to build'
        required: false
        type: string
        default: 'x86_64,aarch64'
      build_packages:
        description: 'Package formats'
        required: false
        type: string
        default: 'appimage,deb,rpm,tarball'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Build Matrix
  # ============================================================================
  build-linux:
    name: Build Linux ${{ matrix.arch }} (${{ matrix.format }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 builds
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            format: appimage
            cross: false
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            format: deb
            cross: false
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            format: rpm
            cross: false
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            format: tarball
            cross: false
          # ARM64 builds (using cross compilation)
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            format: tarball
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ==========================================================================
      # Setup Environment
      # ==========================================================================
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross (for ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-${{ matrix.arch }}-${{ matrix.format }}-${{ hashFiles('**/Cargo.lock') }}
          shared-key: linux-${{ matrix.arch }}-${{ matrix.format }}

      # ==========================================================================
      # Install Dependencies
      # ==========================================================================
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config \
            libssl-dev \
            build-essential \
            curl \
            git \
            cmake \
            fakeroot \
            rpm \
            lintian \
            devscripts \
            debhelper \
            libfuse2 \
            appstream \
            desktop-file-utils

      - name: Install cargo-deb
        if: matrix.format == 'deb'
        run: cargo install cargo-deb

      - name: Install cargo-generate-rpm
        if: matrix.format == 'rpm'
        run: cargo install cargo-generate-rpm

      # ==========================================================================
      # Build
      # ==========================================================================
      - name: Build (Native)
        if: '!matrix.cross'
        working-directory: platforms/linux/easyssh-gtk4
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 3
          cargo build --release

      - name: Build (Cross)
        if: matrix.cross
        working-directory: platforms/linux/easyssh-gtk4
        run: cross build --release --target ${{ matrix.target }}

      # ==========================================================================
      # Package: AppImage
      # ==========================================================================
      - name: Build AppImage
        if: matrix.format == 'appimage'
        working-directory: platforms/linux/easyssh-gtk4
        run: |
          chmod +x build-appimage.sh
          ./build-appimage.sh --version ${{ inputs.version }} --output ../../../releases/${{ inputs.version }}/linux

      # ==========================================================================
      # Package: Debian
      # ==========================================================================
      - name: Build Debian Package
        if: matrix.format == 'deb'
        working-directory: platforms/linux/easyssh-gtk4
        run: |
          cargo deb --variant release \
            --output "../../../releases/${{ inputs.version }}/linux/easyssh_${{ inputs.version }}_${{ matrix.arch }}.deb" \
            --deb-version "${{ inputs.version }}" \
            --deb-maintainer "EasySSH Team <team@anixops.com>" \
            --deb-description "Modern SSH client with GTK4 interface" \
            --deb-depends "libgtk-4-1 (>= 4.12), libadwaita-1-0 (>= 1.5), libssl3"

      # ==========================================================================
      # Package: RPM
      # ==========================================================================
      - name: Build RPM Package
        if: matrix.format == 'rpm'
        working-directory: platforms/linux/easyssh-gtk4
        run: |
          # Build with cargo-generate-rpm
          cargo generate-rpm --target ${{ matrix.target }} \
            -o "../../../releases/${{ inputs.version }}/linux/easyssh-${{ inputs.version }}-1.${{ matrix.arch }}.rpm"
        continue-on-error: true

      - name: Build RPM (Fallback)
        if: matrix.format == 'rpm' && failure()
        working-directory: platforms/linux/easyssh-gtk4
        run: |
          # Manual RPM build
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Create spec file
          cat > rpmbuild/SPECS/easyssh.spec << 'EOF'
          Name:           easyssh
          Version:        ${{ inputs.version }}
          Release:        1%{?dist}
          Summary:        Modern SSH client with GTK4 interface
          License:        MIT
          URL:            https://github.com/anixops/easyssh
          Source0:        %{name}-%{version}.tar.gz
          BuildRequires:  gtk4-devel >= 4.12
          BuildRequires:  libadwaita-devel >= 1.5
          Requires:       gtk4 >= 4.12
          Requires:       libadwaita >= 1.5
          Requires:       openssl

          %description
          EasySSH provides secure SSH connection management with an elegant GTK4 interface.

          %prep
          %setup -q

          %install
          install -D -m 755 easyssh %{buildroot}/usr/bin/easyssh
          install -D -m 644 easyssh.desktop %{buildroot}/usr/share/applications/easyssh.desktop

          %files
          /usr/bin/easyssh
          /usr/share/applications/easyssh.desktop
          EOF

          # Create source tarball
          mkdir -p easyssh-${{ inputs.version }}
          cp target/release/easyssh-gtk4 easyssh-${{ inputs.version }}/easyssh
          echo "dummy" > easyssh-${{ inputs.version }}/easyssh.desktop
          tar -czf rpmbuild/SOURCES/easyssh-${{ inputs.version }}.tar.gz easyssh-${{ inputs.version }}

          # Build RPM
          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/easyssh.spec
          cp rpmbuild/RPMS/${{ matrix.arch }}/easyssh-*.rpm "../../../releases/${{ inputs.version }}/linux/"

      # ==========================================================================
      # Package: Tarball
      # ==========================================================================
      - name: Build Tarball
        if: matrix.format == 'tarball'
        working-directory: platforms/linux/easyssh-gtk4
        run: |
          # Create release directory
          mkdir -p "../../../releases/${{ inputs.version }}/linux"

          # Copy binary
          if [ "${{ matrix.cross }}" = "true" ]; then
            cp "target/${{ matrix.target }}/release/easyssh-gtk4" "easyssh"
          else
            cp "target/release/easyssh-gtk4" "easyssh"
          fi
          strip easyssh 2>/dev/null || true

          # Create install script
          cat > install.sh << 'INSTALLEOF'
          #!/bin/bash
          set -e
          PREFIX="${PREFIX:-/usr/local}"
          echo "Installing EasySSH to $PREFIX..."
          install -Dm755 easyssh "$PREFIX/bin/easyssh"
          if [ -f easyssh.desktop ]; then
            install -Dm644 easyssh.desktop "/usr/share/applications/easyssh.desktop" 2>/dev/null || true
          fi
          echo "EasySSH installed successfully!"
          INSTALLEOF
          chmod +x install.sh

          # Create tarball
          tar -czf "../../../releases/${{ inputs.version }}/linux/EasySSH-${{ inputs.version }}-linux-${{ matrix.arch }}.tar.gz" \
            easyssh install.sh

      # ==========================================================================
      # Verify and Checksum
      # ==========================================================================
      - name: Verify Package
        run: |
          ls -la "releases/${{ inputs.version }}/linux/"

      - name: Generate Checksum
        run: |
          cd "releases/${{ inputs.version }}/linux"
          for file in *; do
            if [ -f "$file" ]; then
              sha256sum "$file" >> SHA256SUMS
            fi
          done
          cat SHA256SUMS

      # ==========================================================================
      # Upload Artifacts
      # ==========================================================================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}-${{ matrix.format }}
          path: releases/${{ inputs.version }}/linux/*
          retention-days: 30
          if-no-files-found: error

  # ============================================================================
  # Flatpak Build
  # ============================================================================
  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-22.04
    if: contains(inputs.build_packages, 'flatpak') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: |
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config

      - name: Build
        working-directory: platforms/linux/easyssh-gtk4
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 3
          cargo build --release

      - name: Create Flatpak Manifest
        working-directory: platforms/linux/easyssh-gtk4
        run: |
          mkdir -p flatpak
          cat > flatpak/com.anixops.easyssh.yml << 'EOF'
          app-id: com.anixops.easyssh
          runtime: org.gnome.Platform
          runtime-version: '45'
          sdk: org.gnome.Sdk
          command: easyssh
          finish-args:
            - --share=network
            - --share=ipc
            - --socket=x11
            - --socket=wayland
            - --device=dri
            - --filesystem=home
            - --filesystem=xdg-run/keyring
            - --talk-name=org.freedesktop.secrets
          modules:
            - name: easyssh
              buildsystem: simple
              build-commands:
                - install -D easyssh /app/bin/easyssh
                - install -D com.anixops.easyssh.desktop /app/share/applications/com.anixops.easyssh.desktop
                - install -D com.anixops.easyssh.metainfo.xml /app/share/metainfo/com.anixops.easyssh.metainfo.xml
              sources:
                - type: file
                  path: target/release/easyssh-gtk4
                  dest-filename: easyssh
          EOF

      - name: Build Flatpak
        working-directory: platforms/linux/easyssh-gtk4
        run: |
          mkdir -p ../../releases/${{ inputs.version }}/linux
          flatpak-builder --force-clean --repo=repo flatpak/build flatpak/com.anixops.easyssh.yml || {
            echo "Flatpak build failed, continuing..."
            exit 0
          }
          flatpak build-bundle repo "../../releases/${{ inputs.version }}/linux/EasySSH-${{ inputs.version }}-flatpak.flatpak" com.anixops.easyssh
        continue-on-error: true

      - name: Upload Flatpak
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: linux-flatpak
          path: releases/${{ inputs.version }}/linux/*.flatpak
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================================
  # Summary
  # ============================================================================
  release-summary:
    name: Linux Release Summary
    needs: [build-linux, build-flatpak]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: linux-*

      - name: Generate Summary
        run: |
          echo "# Linux Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Channel:** ${{ inputs.channel }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build-linux.result }}" == "success" ]; then
            echo "| Linux Builds | ✅ |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.build-linux.result }}" == "skipped" ]; then
            echo "| Linux Builds | ⏭️ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Linux Builds | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.build-flatpak.result }}" == "success" ]; then
            echo "| Flatpak | ✅ |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.build-flatpak.result }}" == "skipped" ]; then
            echo "| Flatpak | ⏭️ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Flatpak | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          find artifacts -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.flatpak" \) | while read file; do
            filename=$(basename "$file")
            size=$(du -h "$file" | cut -f1)
            echo "- $filename ($size)" >> $GITHUB_STEP_SUMMARY
          done

      - name: Merge Checksums
        run: |
          mkdir -p releases/${{ inputs.version }}/linux
          find artifacts -name "SHA256SUMS" -exec cat {} \; > releases/${{ inputs.version }}/linux/SHA256SUMS
          cat releases/${{ inputs.version }}/linux/SHA256SUMS

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-release-${{ inputs.version }}
          path: releases/${{ inputs.version }}/linux/*
          retention-days: 30
