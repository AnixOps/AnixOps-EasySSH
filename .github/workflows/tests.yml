name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}

    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run unit tests (Lite feature)
      run: |
        cd crates/easyssh-core
        cargo test --lib --features lite -- --test-threads=1

    - name: Run unit tests (Standard feature)
      run: |
        cd crates/easyssh-core
        cargo test --lib --features standard -- --test-threads=1

    - name: Run integration tests
      run: |
        cd crates/easyssh-core
        cargo test --test '*' --features lite

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Install cargo-tarpaulin
      run: cargo install cargo-tarpaulin

    - name: Generate coverage report
      run: |
        cd crates/easyssh-core
        cargo tarpaulin --features lite --out xml --out html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./crates/easyssh-core/cobertura.xml
        fail_ci_if_error: true

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run benchmarks
      run: |
        cd crates/easyssh-core
        cargo bench --features lite -- --quick
