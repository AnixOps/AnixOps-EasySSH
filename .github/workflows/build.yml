name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==================== Core Library ====================
  core:
    name: Core Library
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Core
        run: cargo build --release -p easyssh-core

      - name: Run Tests
        run: cargo test --release -p easyssh-core

      - name: Clippy
        run: cargo clippy -p easyssh-core -- -D warnings

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: core-${{ matrix.os }}
          path: target/release/*easyssh_core*
          if-no-files-found: warn

  # ==================== TUI CLI ====================
  tui:
    name: TUI CLI
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build TUI
        run: cargo build --release -p easyssh-tui

      - name: Test TUI (Unix)
        if: runner.os != 'Windows'
        run: |
          ./target/release/easyssh --version
          ./target/release/easyssh --help

      - name: Test TUI (Windows)
        if: runner.os == 'Windows'
        run: |
          .\target\release\easyssh.exe --version
          .\target\release\easyssh.exe --help

      - name: Upload Binary
        uses: actions/upload-artifact@v7
        with:
          name: tui-${{ matrix.os }}
          path: target/release/easyssh*
          if-no-files-found: warn

  # ==================== Native Apps (Optional) ====================
  native-apps:
    name: Native Apps
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-gtk4
            workdir: platforms/linux/easyssh-gtk4
            deps: "libgtk-4-dev libadwaita-1-dev pkg-config"
          - os: macos-latest
            name: macos-swift
            workdir: platforms/macos/EasySSH
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install Dependencies (Linux)
        if: matrix.name == 'linux-gtk4'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.deps }}

      - name: Build Native App
        working-directory: ${{ matrix.workdir }}
        run: |
          echo "Building ${{ matrix.name }}..."
          cargo build --release || echo "Build may have issues - checking what we have"
          ls -la target/release/ || true

      - name: Upload Native Build
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-build
          path: |
            ${{ matrix.workdir }}/target/release/*
            ${{ matrix.workdir }}/.build/
          if-no-files-found: warn

  # ==================== Release ====================
  release:
    name: Create Release
    needs: [core, tui]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v8

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            tui-*/*
          draft: true
          prerelease: true
          generate_release_notes: true
