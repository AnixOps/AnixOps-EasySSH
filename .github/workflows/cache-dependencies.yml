# Dependencies Cache Optimization Workflow
name: Cache Dependencies

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    # Update caches weekly
    - cron: '0 0 * * 0'

jobs:
  # ============================================================================
  # Pre-warm Cargo Cache
  # ============================================================================
  cache-cargo:
    name: Cache Cargo Dependencies
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo Cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Fetch Dependencies
        run: cargo fetch

      - name: Build Dependencies
        run: cargo build --release -p easyssh-core

      - name: Save Cargo Cache
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

  # ============================================================================
  # Pre-warm Node.js Cache
  # ============================================================================
  cache-node:
    name: Cache Node Dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Cache Node Modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

  # ============================================================================
  # Docker Layer Cache
  # ============================================================================
  cache-docker:
    name: Cache Docker Layers
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker Layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker Images (Cache Only)
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -f docker/lite/Dockerfile .

      - name: Move Cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ============================================================================
  # System Dependencies Cache (Linux)
  # ============================================================================
  cache-apt:
    name: Cache APT Packages
    runs-on: ubuntu-latest

    steps:
      - name: Cache APT Packages
        uses: actions/cache@v5
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config \
            libssl-dev

  # ============================================================================
  # Cross-Compilation Toolchains
  # ============================================================================
  cache-cross:
    name: Cache Cross Toolchains
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu,x86_64-unknown-linux-musl

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cross Toolchains
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cross
          key: ${{ runner.os }}-cross-${{ hashFiles('Cargo.lock') }}
