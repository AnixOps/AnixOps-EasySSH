<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasySSH 日志监控中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
            transition: background 0.3s;
        }

        .status-indicator.connected {
            background: #198754;
        }

        .container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: calc(100vh - 70px);
        }

        /* 侧边栏 */
        .sidebar {
            background: #16213e;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #2d2d44;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        /* 源列表 */
        .source-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .source-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #1a1a2e;
            border-radius: 8px;
            border: 1px solid #2d2d44;
            cursor: pointer;
            transition: all 0.2s;
        }

        .source-item:hover {
            border-color: #667eea;
        }

        .source-item.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .source-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .source-info {
            flex: 1;
        }

        .source-name {
            font-size: 13px;
            font-weight: 500;
        }

        .source-path {
            font-size: 11px;
            color: #6c757d;
            margin-top: 2px;
        }

        .source-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #28a745;
        }

        .source-status.offline {
            background: #dc3545;
        }

        /* 过滤器 */
        .filter-group {
            margin-bottom: 15px;
        }

        .filter-label {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 6px;
            display: block;
        }

        .filter-input {
            width: 100%;
            padding: 8px 12px;
            background: #1a1a2e;
            border: 1px solid #2d2d44;
            border-radius: 6px;
            color: #eee;
            font-size: 13px;
        }

        .filter-input:focus {
            outline: none;
            border-color: #667eea;
        }

        select.filter-input {
            cursor: pointer;
        }

        /* 级别复选框 */
        .level-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .level-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.5;
        }

        .level-tag.active {
            opacity: 1;
        }

        .level-tag.TRACE { background: #6c757d; }
        .level-tag.DEBUG { background: #0d6efd; }
        .level-tag.INFO { background: #198754; }
        .level-tag.WARN { background: #ffc107; color: #000; }
        .level-tag.ERROR { background: #dc3545; }
        .level-tag.FATAL { background: #721c24; }

        /* 主内容区 */
        .main-content {
            display: grid;
            grid-template-rows: auto 1fr auto;
            overflow: hidden;
        }

        /* 统计栏 */
        .stats-bar {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #2d2d44;
            overflow-x: auto;
        }

        .stat-item {
            text-align: center;
            min-width: 100px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 11px;
            color: #6c757d;
            margin-top: 4px;
        }

        /* 图表区域 */
        .charts-area {
            background: #1a1a2e;
            padding: 20px;
            border-bottom: 1px solid #2d2d44;
        }

        .chart-container {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
        }

        .chart-title {
            font-size: 14px;
            margin-bottom: 15px;
            color: #a0aec0;
        }

        #timeSeriesChart {
            width: 100%;
            height: 150px;
        }

        /* 日志视图 */
        .log-view {
            overflow-y: auto;
            padding: 20px;
            background: #1a1a2e;
        }

        .log-entries {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #2d2d44;
            display: flex;
            gap: 12px;
            align-items: baseline;
        }

        .log-entry:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .log-timestamp {
            color: #6c757d;
            font-size: 11px;
            white-space: nowrap;
            min-width: 75px;
        }

        .log-level {
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            min-width: 50px;
            text-align: center;
        }

        .log-source {
            color: #667eea;
            font-size: 11px;
            white-space: nowrap;
            min-width: 100px;
        }

        .log-message {
            flex: 1;
            word-break: break-word;
        }

        /* 底部工具栏 */
        .toolbar {
            background: #16213e;
            padding: 15px 20px;
            border-top: 1px solid #2d2d44;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toolbar-left {
            display: flex;
            gap: 10px;
        }

        .toolbar-right {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
        }

        .btn-secondary {
            background: #2d2d44;
            color: #eee;
        }

        .btn-secondary:hover {
            background: #3d3d54;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        /* 告警面板 */
        .alerts-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 350px;
            max-height: 400px;
            background: #16213e;
            border: 1px solid #dc3545;
            border-radius: 8px;
            overflow: hidden;
            z-index: 1000;
            display: none;
        }

        .alerts-panel.visible {
            display: block;
        }

        .alerts-header {
            background: #dc3545;
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .alerts-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .alert-item {
            padding: 12px 15px;
            border-bottom: 1px solid #2d2d44;
        }

        .alert-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .alert-message {
            font-size: 12px;
            color: #6c757d;
        }

        .alert-time {
            font-size: 11px;
            color: #6c757d;
            margin-top: 6px;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #4a4a6a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #667eea;
        }

        /* 搜索高亮 */
        .highlight {
            background: rgba(255, 193, 7, 0.3);
            padding: 1px 3px;
            border-radius: 2px;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #2d2d44;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6c757d;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>EasySSH 日志监控中心</h1>
        <div class="connection-status">
            <span id="statusText">未连接</span>
            <div id="statusIndicator" class="status-indicator"></div>
            <button id="connectBtn" class="btn btn-primary">连接</button>
        </div>
    </header>

    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <!-- 日志源 -->
            <div class="section">
                <div class="section-title">日志源</div>
                <div id="sourceList" class="source-list">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
                <button id="addSourceBtn" class="btn btn-secondary" style="width: 100%; margin-top: 10px;">
                    + 添加日志源
                </button>
            </div>

            <!-- 过滤 -->
            <div class="section">
                <div class="section-title">过滤器</div>
                <div class="filter-group">
                    <label class="filter-label">最小级别</label>
                    <select id="minLevel" class="filter-input">
                        <option value="TRACE">TRACE</option>
                        <option value="DEBUG">DEBUG</option>
                        <option value="INFO" selected>INFO</option>
                        <option value="WARN">WARN</option>
                        <option value="ERROR">ERROR</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">关键词搜索</label>
                    <input type="text" id="keywordFilter" class="filter-input" placeholder="输入关键词...">
                </div>
                <div class="filter-group">
                    <label class="filter-label">正则过滤</label>
                    <input type="text" id="regexFilter" class="filter-input" placeholder="正则表达式...">
                </div>
            </div>

            <!-- 级别过滤标签 -->
            <div class="section">
                <div class="section-title">级别显示</div>
                <div class="level-filters">
                    <span class="level-tag TRACE active" data-level="TRACE">TRACE</span>
                    <span class="level-tag DEBUG active" data-level="DEBUG">DEBUG</span>
                    <span class="level-tag INFO active" data-level="INFO">INFO</span>
                    <span class="level-tag WARN active" data-level="WARN">WARN</span>
                    <span class="level-tag ERROR active" data-level="ERROR">ERROR</span>
                </div>
            </div>

            <!-- 告警规则 -->
            <div class="section">
                <div class="section-title">告警规则</div>
                <button id="addAlertBtn" class="btn btn-secondary" style="width: 100%;">
                    + 添加告警规则
                </button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 统计栏 -->
            <div class="stats-bar">
                <div class="stat-item">
                    <div id="totalEntries" class="stat-value">0</div>
                    <div class="stat-label">总日志数</div>
                </div>
                <div class="stat-item">
                    <div id="errorCount" class="stat-value" style="color: #dc3545;">0</div>
                    <div class="stat-label">错误数</div>
                </div>
                <div class="stat-item">
                    <div id="warnCount" class="stat-value" style="color: #ffc107;">0</div>
                    <div class="stat-label">警告数</div>
                </div>
                <div class="stat-item">
                    <div id="logsPerMinute" class="stat-value">0</div>
                    <div class="stat-label">日志/分钟</div>
                </div>
                <div class="stat-item">
                    <div id="errorRate" class="stat-value">0%</div>
                    <div class="stat-label">错误率</div>
                </div>
            </div>

            <!-- 图表区域 -->
            <div class="charts-area">
                <div class="chart-container">
                    <div class="chart-title">日志趋势</div>
                    <canvas id="timeSeriesChart"></canvas>
                </div>
            </div>

            <!-- 日志视图 -->
            <div class="log-view" id="logView">
                <div class="log-entries" id="logEntries">
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <p>等待日志数据...</p>
                    </div>
                </div>
            </div>

            <!-- 底部工具栏 -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <button id="pauseBtn" class="btn btn-secondary">暂停</button>
                    <button id="clearBtn" class="btn btn-secondary">清空</button>
                    <button id="tailBtn" class="btn btn-primary">自动滚动</button>
                </div>
                <div class="toolbar-right">
                    <button id="exportBtn" class="btn btn-secondary">导出</button>
                    <button id="analyzeBtn" class="btn btn-primary">分析</button>
                </div>
            </div>
        </main>
    </div>

    <!-- 告警面板 -->
    <div id="alertsPanel" class="alerts-panel">
        <div class="alerts-header">
            <span>告警通知</span>
            <button id="closeAlerts" class="btn btn-secondary" style="padding: 4px 8px; font-size: 12px;">关闭</button>
        </div>
        <div id="alertsList" class="alerts-list"></div>
    </div>

    <script src="log-monitor-client.js"></script>
    <script>
        // 初始化客户端
        const client = new LogMonitorClient('ws://127.0.0.1:8765');
        const charts = new LogMonitorCharts('timeSeriesChart');

        let isPaused = false;
        let autoScroll = true;
        const alerts = [];

        // 元素引用
        const elements = {
            statusText: document.getElementById('statusText'),
            statusIndicator: document.getElementById('statusIndicator'),
            connectBtn: document.getElementById('connectBtn'),
            sourceList: document.getElementById('sourceList'),
            logEntries: document.getElementById('logView'),
            logContainer: document.getElementById('logEntries'),
            totalEntries: document.getElementById('totalEntries'),
            errorCount: document.getElementById('errorCount'),
            warnCount: document.getElementById('warnCount'),
            logsPerMinute: document.getElementById('logsPerMinute'),
            errorRate: document.getElementById('errorRate'),
            minLevel: document.getElementById('minLevel'),
            keywordFilter: document.getElementById('keywordFilter'),
            regexFilter: document.getElementById('regexFilter'),
            pauseBtn: document.getElementById('pauseBtn'),
            clearBtn: document.getElementById('clearBtn'),
            tailBtn: document.getElementById('tailBtn'),
            exportBtn: document.getElementById('exportBtn'),
            analyzeBtn: document.getElementById('analyzeBtn'),
            alertsPanel: document.getElementById('alertsPanel'),
            alertsList: document.getElementById('alertsList'),
            closeAlerts: document.getElementById('closeAlerts')
        };

        // 连接管理
        elements.connectBtn.addEventListener('click', () => {
            if (client.isConnected) {
                client.disconnect();
            } else {
                client.connect();
            }
        });

        client.on('onConnect', () => {
            elements.statusText.textContent = '已连接';
            elements.statusIndicator.classList.add('connected');
            elements.connectBtn.textContent = '断开';
            elements.connectBtn.classList.remove('btn-primary');
            elements.connectBtn.classList.add('btn-danger');

            // 请求数据源列表
            client.getSources();
            client.getStats(3600);
        });

        client.on('onDisconnect', () => {
            elements.statusText.textContent = '未连接';
            elements.statusIndicator.classList.remove('connected');
            elements.connectBtn.textContent = '连接';
            elements.connectBtn.classList.add('btn-primary');
            elements.connectBtn.classList.remove('btn-danger');
        });

        // 日志源更新
        client.on('onSources', (sources) => {
            elements.sourceList.innerHTML = '';
            sources.forEach(source => {
                const item = document.createElement('div');
                item.className = 'source-item active';
                item.innerHTML = `
                    <div class="source-color" style="background: ${source.color}"></div>
                    <div class="source-info">
                        <div class="source-name">${source.name}</div>
                        <div class="source-path">${source.log_path}</div>
                    </div>
                    <div class="source-status ${source.enabled ? '' : 'offline'}"></div>
                `;
                item.addEventListener('click', () => {
                    item.classList.toggle('active');
                    updateSourceFilter();
                });
                elements.sourceList.appendChild(item);
            });
        });

        function updateSourceFilter() {
            const activeItems = document.querySelectorAll('.source-item.active');
            const sourceIds = Array.from(activeItems).map(item => {
                // 这里需要存储source_id，简化处理
                return item.dataset.sourceId;
            });
            client.setSourceFilter(sourceIds);
        }

        // 新日志条目
        client.on('onEntry', (entry) => {
            if (isPaused) return;
            appendLogEntry(entry);
            updateStats();
        });

        client.on('onBatch', (entries) => {
            if (isPaused) return;
            entries.forEach(entry => appendLogEntry(entry));
            updateStats();
        });

        function appendLogEntry(entry) {
            const existingEmpty = elements.logContainer.querySelector('.empty-state');
            if (existingEmpty) {
                existingEmpty.remove();
            }

            const div = document.createElement('div');
            div.className = 'log-entry';
            div.dataset.level = entry.level;

            const timestamp = new Date(entry.timestamp * 1000).toLocaleTimeString();
            const color = entry.color || client.levelColors[entry.level] || '#6c757d';

            div.innerHTML = `
                <span class="log-timestamp">${timestamp}</span>
                <span class="log-level" style="background: ${color}; color: ${entry.level === 'WARN' ? '#000' : '#fff'}">${entry.level}</span>
                <span class="log-source" style="color: ${entry.color || '#667eea'}">[${entry.source_name}]</span>
                <span class="log-message">${escapeHtml(entry.message)}</span>
            `;

            // 高亮搜索关键词
            const keyword = elements.keywordFilter.value;
            if (keyword) {
                const messageEl = div.querySelector('.log-message');
                messageEl.innerHTML = highlightText(messageEl.textContent, keyword);
            }

            elements.logContainer.appendChild(div);

            // 限制条目数
            while (elements.logContainer.children.length > 1000) {
                elements.logContainer.removeChild(elements.logContainer.firstChild);
            }

            // 自动滚动
            if (autoScroll) {
                elements.logEntries.scrollTop = elements.logEntries.scrollHeight;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function highlightText(text, keyword) {
            if (!keyword) return text;
            const regex = new RegExp(`(${escapeRegex(keyword)})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // 统计更新
        client.on('onStats', (stats) => {
            elements.totalEntries.textContent = stats.total_entries.toLocaleString();
            elements.errorCount.textContent = (stats.entries_by_level.ERROR || 0).toLocaleString();
            elements.warnCount.textContent = (stats.entries_by_level.WARN || 0).toLocaleString();
            elements.logsPerMinute.textContent = stats.entries_per_minute.toFixed(1);
            elements.errorRate.textContent = stats.error_rate.toFixed(2) + '%';

            // 更新图表
            if (stats.time_series) {
                charts.updateTimeSeries(stats.time_series);
            }
        });

        function updateStats() {
            elements.totalEntries.textContent = client.entries.length.toLocaleString();
            elements.errorCount.textContent = Object.entries(client.stats.entriesByLevel)
                .filter(([k, v]) => ['ERROR', 'FATAL'].includes(k))
                .reduce((sum, [k, v]) => sum + v, 0)
                .toLocaleString();
        }

        // 告警处理
        client.on('onAlert', (alert) => {
            alerts.unshift(alert);
            elements.alertsPanel.classList.add('visible');

            const alertItem = document.createElement('div');
            alertItem.className = 'alert-item';
            alertItem.innerHTML = `
                <div class="alert-title">${alert.rule_name}</div>
                <div class="alert-message">${alert.message}</div>
                <div class="alert-time">${new Date(alert.triggered_at * 1000).toLocaleString()}</div>
            `;
            elements.alertsList.insertBefore(alertItem, elements.alertsList.firstChild);

            // 限制告警数
            while (elements.alertsList.children.length > 10) {
                elements.alertsList.removeChild(elements.alertsList.lastChild);
            }
        });

        elements.closeAlerts.addEventListener('click', () => {
            elements.alertsPanel.classList.remove('visible');
        });

        // 过滤器事件
        elements.minLevel.addEventListener('change', (e) => {
            client.setMinLevel(e.target.value);
        });

        elements.keywordFilter.addEventListener('input', debounce((e) => {
            const keywords = e.target.value.split(/\s+/).filter(k => k);
            client.setKeywords(keywords);
            refreshDisplay();
        }, 300));

        elements.regexFilter.addEventListener('input', debounce((e) => {
            client.setRegexPattern(e.target.value);
            refreshDisplay();
        }, 300));

        // 级别标签过滤
        document.querySelectorAll('.level-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                tag.classList.toggle('active');
                // 实际实现应该更新过滤
            });
        });

        // 工具栏按钮
        elements.pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            elements.pauseBtn.textContent = isPaused ? '继续' : '暂停';
        });

        elements.clearBtn.addEventListener('click', () => {
            elements.logContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <p>日志已清空</p>
                </div>
            `;
            client.clear();
        });

        elements.tailBtn.addEventListener('click', () => {
            autoScroll = !autoScroll;
            elements.tailBtn.classList.toggle('btn-primary', autoScroll);
            elements.tailBtn.classList.toggle('btn-secondary', !autoScroll);
        });

        elements.exportBtn.addEventListener('click', () => {
            const format = prompt('选择导出格式 (json/csv/txt):', 'json');
            if (format) {
                client.exportToFile(format, `logs_${new Date().toISOString().split('T')[0]}`);
            }
        });

        elements.analyzeBtn.addEventListener('click', () => {
            client.analyze(3600);
        });

        // 辅助函数
        function debounce(fn, ms) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => fn.apply(this, args), ms);
            };
        }

        function refreshDisplay() {
            elements.logContainer.innerHTML = '';
            const filtered = client.getFilteredEntries();
            filtered.forEach(entry => appendLogEntry(entry));
        }

        // 请求通知权限
        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // 自动连接
        // client.connect();
    </script>
</body>
</html>
