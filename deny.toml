# Cargo Deny Configuration
# For full documentation: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "BSL-1.0",
    "Zlib",
    "OFL-1.1",
    "LicenseRef-UFL-1.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [
    { path = "LICENSE", hash = 0x001c7e6c }
]

[[licenses.clarify]]
name = "epaint"
expression = "(MIT OR Apache-2.0) AND OFL-1.1 AND LicenseRef-UFL-1.0"

[[licenses.clarify]]
name = "clipboard-win"
expression = "BSL-1.0"

[[licenses.clarify]]
name = "error-code"
expression = "BSL-1.0"

[[licenses.clarify]]
name = "foldhash"
expression = "Zlib"

[[licenses.clarify]]
name = "icu_collections"
expression = "Unicode-3.0"

[[licenses.clarify]]
name = "icu_properties"
expression = "Unicode-3.0"

[[licenses.clarify]]
name = "icu_normalizer"
expression = "Unicode-3.0"

[[licenses.clarify]]
name = "idna_adapter"
expression = "Unicode-3.0"

[[licenses.clarify]]
name = "tinystr"
expression = "Unicode-3.0"

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
