version: '3.8'

services:
  easyssh-pro-server:
    build:
      context: ../..
      dockerfile: docker/pro-server/Dockerfile
      target: runtime
    image: anixops/easyssh-pro:${VERSION:-latest}
    container_name: easyssh-pro-server
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      - RUST_LOG=info
      - EASYSSH_DATA_DIR=/data/easyssh
      - EASYSSH_SERVER_PORT=8080
      - EASYSSH_SERVER_HOST=0.0.0.0
    volumes:
      - easyssh-data:/data/easyssh
      - ./config:/etc/easyssh:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - easyssh-network

  # Optional: Redis for session storage
  redis:
    image: redis:7-alpine
    container_name: easyssh-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - easyssh-network

  # Optional: PostgreSQL for team features
  postgres:
    image: postgres:16-alpine
    container_name: easyssh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: easyssh
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: easyssh_pro
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - easyssh-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: easyssh-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - easyssh-pro-server
    networks:
      - easyssh-network

volumes:
  easyssh-data:
  redis-data:
  postgres-data:

networks:
  easyssh-network:
    driver: bridge
