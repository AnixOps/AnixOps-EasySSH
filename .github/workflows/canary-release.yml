name: Canary Release

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        default: 'develop'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-canary:
    name: Build Canary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || 'develop' }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Get version
        id: version
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')
          echo "version=$VERSION-canary.$(date +%Y%m%d)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build (Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo build -p easyssh-gtk4 --release --target ${{ matrix.target }}
          mkdir -p dist
          cp target/${{ matrix.target }}/release/easyssh-gtk4 dist/easyssh-${{ steps.version.outputs.version }}-linux-x64

      - name: Build (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: |
          cargo build -p easyssh-winui --release --target ${{ matrix.target }}
          mkdir -p dist
          cp target/${{ matrix.target }}/release/EasySSH.exe dist/easyssh-${{ steps.version.outputs.version }}-windows-x64.exe

      - name: Build (macOS)
        if: contains(matrix.target, 'darwin')
        run: |
          cargo build -p easyssh-core --release --target ${{ matrix.target }}
          mkdir -p dist
          cp target/${{ matrix.target }}/release/libeasyssh_core.dylib dist/easyssh-${{ steps.version.outputs.version }}-${{ matrix.target }}.dylib

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: canary-${{ matrix.target }}-${{ steps.version.outputs.version }}
          path: dist/*

  release-canary:
    name: Release Canary
    needs: build-canary
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: canary-*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: canary-${{ github.run_number }}
          name: Canary Build ${{ github.run_number }}
          prerelease: true
          files: artifacts/**/*
          body: |
            ## Canary Build ${{ github.run_number }}

            This is an automated canary build from the `${{ github.event.inputs.branch || 'develop' }}` branch.

            **Warning**: This is a pre-release build for testing purposes only. It may contain bugs or incomplete features.

            ### Changes since last canary:
            ${{ github.event.head_commit.message }}

            ### Installation:
            - **Linux**: Download and run `easyssh-*-linux-x64`
            - **Windows**: Download and run `easyssh-*-windows-x64.exe`
            - **macOS**: Download the appropriate `.dylib` for your architecture
