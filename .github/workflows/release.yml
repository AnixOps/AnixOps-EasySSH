name: Release Automation

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'
      - 'lite-v[0-9]+.[0-9]+.[0-9]+'
      - 'standard-v[0-9]+.[0-9]+.[0-9]+'
      - 'pro-v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.2.3)'
        required: true
        type: string
      version_type:
        description: 'Version type to build'
        required: true
        type: choice
        options:
          - all
          - lite
          - standard
          - pro
        default: all
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        type: boolean
        default: false
      draft:
        description: 'Create as draft release?'
        required: false
        type: boolean
        default: false
      skip_signing:
        description: 'Skip code signing?'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Extract Version Info
  # ============================================================================
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_no_v: ${{ steps.get_version.outputs.version_no_v }}
      is_prerelease: ${{ steps.get_version.outputs.is_prerelease }}
      channel: ${{ steps.get_version.outputs.channel }}
      version_type: ${{ steps.get_version.outputs.version_type }}
      build_lite: ${{ steps.get_version.outputs.build_lite }}
      build_standard: ${{ steps.get_version.outputs.build_standard }}
      build_pro: ${{ steps.get_version.outputs.build_pro }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version info
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION_TYPE="${{ github.event.inputs.version_type }}"
            IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
            # Detect version type from tag prefix
            if [[ "$VERSION" == lite-v* ]]; then
              VERSION_TYPE="lite"
              IS_PRERELEASE="false"
            elif [[ "$VERSION" == standard-v* ]]; then
              VERSION_TYPE="standard"
              IS_PRERELEASE="false"
            elif [[ "$VERSION" == pro-v* ]]; then
              VERSION_TYPE="pro"
              IS_PRERELEASE="false"
            else
              VERSION_TYPE="all"
              IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
            fi
          fi

          # Remove prefixes for clean version number
          VERSION_NO_V="${VERSION#lite-v}"
          VERSION_NO_V="${VERSION_NO_V#standard-v}"
          VERSION_NO_V="${VERSION_NO_V#pro-v}"
          VERSION_NO_V="${VERSION_NO_V#v}"

          # Determine channel
          if [[ "$VERSION" == *"alpha"* ]]; then
            CHANNEL="alpha"
            IS_PRERELEASE="true"
          elif [[ "$VERSION" == *"beta"* ]]; then
            CHANNEL="beta"
            IS_PRERELEASE="true"
          elif [[ "$VERSION" == *"rc"* ]]; then
            CHANNEL="rc"
            IS_PRERELEASE="true"
          elif [ "$IS_PRERELEASE" = "true" ]; then
            CHANNEL="canary"
          else
            CHANNEL="stable"
          fi

          # Set build flags
          BUILD_LITE="false"
          BUILD_STANDARD="false"
          BUILD_PRO="false"
          if [ "$VERSION_TYPE" = "all" ]; then
            BUILD_LITE="true"
            BUILD_STANDARD="true"
            BUILD_PRO="true"
          else
            if [ "$VERSION_TYPE" = "lite" ]; then BUILD_LITE="true"; fi
            if [ "$VERSION_TYPE" = "standard" ]; then BUILD_STANDARD="true"; fi
            if [ "$VERSION_TYPE" = "pro" ]; then BUILD_PRO="true"; fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_no_v=$VERSION_NO_V" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "version_type=$VERSION_TYPE" >> $GITHUB_OUTPUT
          echo "build_lite=$BUILD_LITE" >> $GITHUB_OUTPUT
          echo "build_standard=$BUILD_STANDARD" >> $GITHUB_OUTPUT
          echo "build_pro=$BUILD_PRO" >> $GITHUB_OUTPUT

          echo "Version: $VERSION"
          echo "Version No-V: $VERSION_NO_V"
          echo "Channel: $CHANNEL"
          echo "Version Type: $VERSION_TYPE"
          echo "Build Lite: $BUILD_LITE"
          echo "Build Standard: $BUILD_STANDARD"
          echo "Build Pro: $BUILD_PRO"

  # ============================================================================
  # Security Checks
  # ============================================================================
  security-checks:
    name: Security Checks
    needs: version
    uses: ./.github/workflows/security.yml

  # ============================================================================
  # Test Suite
  # ============================================================================
  test-suite:
    name: Test Suite (All Versions)
    needs: version
    uses: ./.github/workflows/test.yml

  # ============================================================================
  # Build Windows (Lite/Standard/Pro) - Matrix Strategy
  # ============================================================================
  build-windows:
    name: Windows ${{ matrix.version }} ${{ matrix.arch }}
    needs: [version, test-suite, security-checks]
    if: |
      (needs.version.outputs.build_lite == 'true' && matrix.version == 'lite') ||
      (needs.version.outputs.build_standard == 'true' && matrix.version == 'standard') ||
      (needs.version.outputs.build_pro == 'true' && matrix.version == 'pro')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Lite
          - version: lite
            arch: x64
            target: x86_64-pc-windows-msvc
            profile: release-lite
            features: lite
            crate: easyssh-winui
          - version: lite
            arch: arm64
            target: aarch64-pc-windows-msvc
            profile: release-lite
            features: lite
            crate: easyssh-winui
          # Standard
          - version: standard
            arch: x64
            target: x86_64-pc-windows-msvc
            profile: release-standard
            features: standard
            crate: easyssh-winui
          - version: standard
            arch: arm64
            target: aarch64-pc-windows-msvc
            profile: release-standard
            features: standard
            crate: easyssh-winui
          # Pro
          - version: pro
            arch: x64
            target: x86_64-pc-windows-msvc
            profile: release-pro
            features: pro
            crate: easyssh-winui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-${{ matrix.version }}-${{ matrix.arch }}-${{ matrix.target }}

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build ${{ matrix.version }} (${{ matrix.arch }})
        working-directory: crates/easyssh-platforms/windows/${{ matrix.crate }}
        env:
          EASYSSH_VERSION: ${{ needs.version.outputs.version_no_v }}
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cargo build --profile ${{ matrix.profile }} --target ${{ matrix.target }} --features ${{ matrix.features }} --no-default-features

      - name: Package ${{ matrix.version }} (${{ matrix.arch }})
        shell: pwsh
        run: |
          $Version = "${{ needs.version.outputs.version_no_v }}"
          $ReleaseVersion = "${{ needs.version.outputs.version }}"
          $Arch = "${{ matrix.arch }}"
          $VerType = "${{ matrix.version }}"
          $ReleaseDir = "releases/$VerType-$ReleaseVersion"
          $PkgName = "easyssh-$VerType-$ReleaseVersion-windows-$Arch"
          $PkgDir = "$ReleaseDir/$PkgName"

          New-Item -ItemType Directory -Force -Path $PkgDir | Out-Null

          # Copy binary
          $SrcBinary = "crates/easyssh-platforms/windows/${{ matrix.crate }}/target/${{ matrix.target }}/${{ matrix.profile }}/EasySSH.exe"
          if (-not (Test-Path $SrcBinary)) {
            # Try alternative binary name
            $SrcBinary = "crates/easyssh-platforms/windows/${{ matrix.crate }}/target/${{ matrix.target }}/${{ matrix.profile }}/easyssh-winui.exe"
          }
          $DestBinary = "$PkgDir/EasySSH.exe"
          Copy-Item $SrcBinary $DestBinary -Force -ErrorAction Stop

          # Create README
          @"
EasySSH ${{ matrix.version }} v$Version for Windows ($Arch)
==================================================

Quick Start:
1. Run "EasySSH.exe"
2. Add your SSH servers via the UI
3. Connect using password or key authentication

System Requirements:
- Windows 10/11 ${{ matrix.arch == 'arm64' && 'ARM64' || '64-bit' }}
- No additional dependencies required

Features:
- Native Windows UI with egui
- SSH connection management
- Password and key-based authentication
- Server grouping
- Secure credential storage via Windows Credential Manager
- ${{ matrix.version == 'pro' && 'Team collaboration + SSO' || '' }}
- ${{ matrix.version == 'standard' && 'Embedded terminal + Splits' || '' }}

For support: https://github.com/anixops/easyssh

Version: $Version
Built: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
"@ | Set-Content "$PkgDir/README.txt" -Encoding UTF8

          # Create ZIP
          Compress-Archive -Path "$PkgDir/*" -DestinationPath "$ReleaseDir/$PkgName.zip" -Force

          # Create MSI using WiX
          $WxsPath = "$ReleaseDir/wix-$VerType-$Arch.wxs"
          @"
<?xml version="1.0" encoding="UTF-8"?>
<Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
    <Product Id="*" Name="EasySSH ${{ matrix.version }}" Language="1033" Version="$Version"
             Manufacturer="AnixOps" UpgradeCode="E3F5A2B7-8C9D-4E1F-2A3B-5C6D7E8F9A0B">
        <Package InstallerVersion="200" Compressed="yes" InstallScope="perMachine" Platform="${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}" />
        <MajorUpgrade DowngradeErrorMessage="A newer version of [ProductName] is already installed." />
        <MediaTemplate EmbedCab="yes" />
        <Feature Id="ProductFeature" Title="EasySSH ${{ matrix.version }}" Level="1">
            <ComponentRef Id="MainExecutable" />
        </Feature>
        <Directory Id="TARGETDIR" Name="SourceDir">
            <Directory Id="${{ matrix.arch == 'arm64' && 'ProgramFiles64Folder' || 'ProgramFilesFolder' }}">
                <Directory Id="APPLICATIONFOLDER" Name="EasySSH ${{ matrix.version }}">
                    <Component Id="MainExecutable" Guid="*">
                        <File Id="EasySSHExe" Source="$($DestBinary -replace '\\', '\\\\')" KeyPath="yes">
                            <Shortcut Id="StartMenuShortcut" Directory="ProgramMenuFolder" Name="EasySSH ${{ matrix.version }}"
                                     WorkingDirectory="APPLICATIONFOLDER" Icon="EasySSH.exe" Advertise="yes" />
                        </File>
                    </Component>
                </Directory>
            </Directory>
            <Directory Id="ProgramMenuFolder" Name="Programs" />
        </Directory>
        <Icon Id="EasySSH.exe" SourceFile="$($DestBinary -replace '\\', '\\\\')" />
        <Property Id="ARPPRODUCTICON" Value="EasySSH.exe" />
    </Product>
</Wix>
"@ | Set-Content $WxsPath -Encoding UTF8

          & "C:\Program Files (x86)\WiX Toolset v3.11\bin\candle.exe" -out "$ReleaseDir/wix-$VerType-$Arch.wixobj" $WxsPath -arch ${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}
          & "C:\Program Files (x86)\WiX Toolset v3.11\bin\light.exe" -out "$ReleaseDir/$PkgName.msi" "$ReleaseDir/wix-$VerType-$Arch.wixobj" -ext WixUIExtension

      - name: Code Signing (Windows)
        if: github.event.inputs.skip_signing != 'true'
        shell: pwsh
        run: |
          if ($env:CERTIFICATE_THUMBPRINT) {
            Write-Host "Signing executable..."
            $Version = "${{ needs.version.outputs.version }}"
            $VerType = "${{ matrix.version }}"
            $Arch = "${{ matrix.arch }}"
            $ExePath = "releases/$VerType-$Version/easyssh-$VerType-$Version-windows-$Arch/EasySSH.exe"

            if (Test-Path $ExePath) {
              signtool.exe sign /sha1 $env:CERTIFICATE_THUMBPRINT /tr http://timestamp.digicert.com /td sha256 /fd sha256 "$ExePath"
              signtool.exe verify /pa "$ExePath"
            }

            # Sign MSI
            $MsiPath = "releases/$VerType-$Version/easyssh-$VerType-$Version-windows-$Arch.msi"
            if (Test-Path $MsiPath) {
              signtool.exe sign /sha1 $env:CERTIFICATE_THUMBPRINT /tr http://timestamp.digicert.com /td sha256 /fd sha256 "$MsiPath"
            }
          } else {
            Write-Host "No certificate thumbprint provided, skipping signing"
          }
        env:
          CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.version }}-${{ matrix.arch }}
          path: |
            releases/${{ matrix.version }}-${{ needs.version.outputs.version }}/*.zip
            releases/${{ matrix.version }}-${{ needs.version.outputs.version }}/*.msi
          if-no-files-found: ignore
          retention-days: 30

  # ============================================================================
  # Build Linux (Lite/Standard/Pro) - Matrix Strategy
  # ============================================================================
  build-linux:
    name: Linux ${{ matrix.version }} ${{ matrix.arch }}
    needs: [version, test-suite, security-checks]
    if: |
      (needs.version.outputs.build_lite == 'true' && matrix.version == 'lite') ||
      (needs.version.outputs.build_standard == 'true' && matrix.version == 'standard') ||
      (needs.version.outputs.build_pro == 'true' && matrix.version == 'pro')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Lite
          - version: lite
            arch: x64
            target: x86_64-unknown-linux-gnu
            profile: release-lite
            features: easyssh-core/lite
            cross: false
          - version: lite
            arch: arm64
            target: aarch64-unknown-linux-gnu
            profile: release-lite
            features: easyssh-core/lite
            cross: true
          # Standard
          - version: standard
            arch: x64
            target: x86_64-unknown-linux-gnu
            profile: release-standard
            features: easyssh-core/standard
            cross: false
          - version: standard
            arch: arm64
            target: aarch64-unknown-linux-gnu
            profile: release-standard
            features: easyssh-core/standard
            cross: true
          # Pro (x64 only)
          - version: pro
            arch: x64
            target: x86_64-unknown-linux-gnu
            profile: release-pro
            features: easyssh-core/pro
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross (for ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-${{ matrix.version }}-${{ matrix.arch }}-${{ matrix.target }}

      - name: Build ${{ matrix.version }} (${{ matrix.arch }})
        working-directory: crates/easyssh-platforms/linux/easyssh-gtk4
        env:
          EASYSSH_VERSION: ${{ needs.version.outputs.version_no_v }}
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --profile ${{ matrix.profile }} --target ${{ matrix.target }} --features ${{ matrix.features }} --no-default-features
          else
            cargo build --profile ${{ matrix.profile }} --target ${{ matrix.target }} --features ${{ matrix.features }} --no-default-features
          fi

      - name: Package ${{ matrix.version }} (${{ matrix.arch }})
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          VERSION_NO_V="${{ needs.version.outputs.version_no_v }}"
          ARCH="${{ matrix.arch }}"
          VER_TYPE="${{ matrix.version }}"
          TARGET="${{ matrix.target }}"
          RELEASE_DIR="releases/$VER_TYPE-$VERSION"
          PKG_NAME="easyssh-$VER_TYPE-$VERSION-linux-$ARCH"
          PKG_DIR="$RELEASE_DIR/$PKG_NAME"

          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/share/applications"
          mkdir -p "$PKG_DIR/usr/share/icons/hicolor/256x256/apps"

          # Copy binary
          if [ "${{ matrix.cross }}" = "true" ]; then
            cp "target/$TARGET/${{ matrix.profile }}/easyssh-gtk4" "$PKG_DIR/usr/bin/easyssh"
          else
            cp "target/${{ matrix.profile }}/easyssh-gtk4" "$PKG_DIR/usr/bin/easyssh"
          fi
          chmod +x "$PKG_DIR/usr/bin/easyssh"

          # Create desktop entry
          cat > "$PKG_DIR/usr/share/applications/easyssh.desktop" << EOF
[Desktop Entry]
Name=EasySSH ${{ matrix.version }}
Comment=SSH Client - ${{ matrix.version }} Edition
Exec=/usr/bin/easyssh
Icon=easyssh
Type=Application
Categories=Network;RemoteAccess;
Terminal=false
Version=$VERSION_NO_V
EOF

          # Create install script
          cat > "$PKG_DIR/install.sh" << 'INSTALLSCRIPT'
#!/bin/bash
set -e
INSTALL_PREFIX="${1:-$HOME/.local}"

if [ "$EUID" -ne 0 ] && [ "$INSTALL_PREFIX" = "/usr/local" ]; then
    echo "Installing to user directory..."
    mkdir -p "$HOME/.local/bin"
    mkdir -p "$HOME/.local/share/applications"
    cp usr/bin/easyssh "$HOME/.local/bin/"
    cp usr/share/applications/easyssh.desktop "$HOME/.local/share/applications/"
    chmod +x "$HOME/.local/bin/easyssh"
    echo "EasySSH installed to ~/.local/bin/"
else
    echo "Installing to $INSTALL_PREFIX..."
    mkdir -p "${INSTALL_PREFIX}/bin"
    cp usr/bin/easyssh "${INSTALL_PREFIX}/bin/"
    chmod +x "${INSTALL_PREFIX}/bin/easyssh"
    echo "EasySSH installed to ${INSTALL_PREFIX}/bin/"
fi

echo "Run 'easyssh' to start."
INSTALLSCRIPT
          chmod +x "$PKG_DIR/install.sh"

          # Create README
          cat > "$PKG_DIR/README.txt" << EOF
EasySSH ${{ matrix.version }} $VERSION for Linux ($ARCH)
=========================================

Quick Start:
1. Run ./install.sh (user install) or sudo ./install.sh (system install)
2. Run 'easyssh' to start

System Requirements:
- GTK4 runtime
- libadwaita runtime
- 64-bit Linux distribution

Features:
${{ matrix.version == 'lite' && '- SSH configuration management' || '' }}
${{ matrix.version == 'lite' && '- Password and key authentication' || '' }}
${{ matrix.version == 'standard' && '- Embedded terminal + Splits' || '' }}
${{ matrix.version == 'standard' && '- SFTP file manager' || '' }}
${{ matrix.version == 'pro' && '- Team collaboration' || '' }}
${{ matrix.version == 'pro' && '- SSO integration' || '' }}
${{ matrix.version == 'pro' && '- Audit logging' || '' }}

For support: https://github.com/anixops/easyssh
EOF

          # Create tarball
          cd "$RELEASE_DIR"
          tar -czf "$PKG_NAME.tar.gz" "$PKG_NAME"
          cd "$GITHUB_WORKSPACE"

          # Generate checksum
          sha256sum "$RELEASE_DIR/$PKG_NAME.tar.gz" >> "$RELEASE_DIR/SHA256SUMS"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.version }}-${{ matrix.arch }}
          path: releases/${{ matrix.version }}-${{ needs.version.outputs.version }}/*.tar.gz
          retention-days: 30

  # ============================================================================
  # Build macOS (Lite/Standard) - Universal Binary
  # ============================================================================
  build-macos:
    name: macOS ${{ matrix.version }} Universal
    needs: [version, test-suite, security-checks]
    if: |
      (needs.version.outputs.build_lite == 'true' && matrix.version == 'lite') ||
      (needs.version.outputs.build_standard == 'true' && matrix.version == 'standard')
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        version: [lite, standard]
        include:
          - version: lite
            profile: release-lite
          - version: standard
            profile: release-standard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-${{ matrix.version }}-universal

      - name: Build Core (x86_64)
        working-directory: crates/easyssh-core
        env:
          EASYSSH_VERSION: ${{ needs.version.outputs.version_no_v }}
        run: |
          cargo build --profile ${{ matrix.profile }} --target x86_64-apple-darwin --features ${{ matrix.version }} --no-default-features

      - name: Build Core (arm64)
        working-directory: crates/easyssh-core
        env:
          EASYSSH_VERSION: ${{ needs.version.outputs.version_no_v }}
        run: |
          cargo build --profile ${{ matrix.profile }} --target aarch64-apple-darwin --features ${{ matrix.version }} --no-default-features

      - name: Create Universal Binary
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          VERSION_NO_V="${{ needs.version.outputs.version_no_v }}"
          VER_TYPE="${{ matrix.version }}"
          PROFILE="${{ matrix.profile }}"
          RELEASE_DIR="releases/$VER_TYPE-$VERSION"
          PKG_NAME="easyssh-$VER_TYPE-$VERSION-macos-universal"
          PKG_DIR="$RELEASE_DIR/$PKG_NAME"

          mkdir -p "$PKG_DIR/EasySSH.app/Contents/MacOS"
          mkdir -p "$PKG_DIR/EasySSH.app/Contents/Resources"

          # Create universal library
          lipo -create \
            "target/x86_64-apple-darwin/$PROFILE/libeasyssh_core.a" \
            "target/aarch64-apple-darwin/$PROFILE/libeasyssh_core.a" \
            -output "$PKG_DIR/EasySSH.app/Contents/MacOS/libeasyssh_core.a" 2>/dev/null || true

          # Copy SwiftUI app if available
          if [ -d "platforms/macos/EasySSH" ]; then
            cd platforms/macos/EasySSH
            if [ -f "Package.swift" ]; then
              swift build -c release --arch x86_64
              swift build -c release --arch arm64
              lipo -create \
                .build/release/EasySSH \
                -output "../../../$PKG_DIR/EasySSH.app/Contents/MacOS/EasySSH"
            fi
            cd "$GITHUB_WORKSPACE"
          fi

          chmod +x "$PKG_DIR/EasySSH.app/Contents/MacOS/EasySSH" 2>/dev/null || true

          # Create Info.plist
          cat > "$PKG_DIR/EasySSH.app/Contents/Info.plist" << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleDevelopmentRegion</key>
    <string>en</string>
    <key>CFBundleExecutable</key>
    <string>EasySSH</string>
    <key>CFBundleIdentifier</key>
    <string>com.anixops.easyssh-${{ matrix.version }}</string>
    <key>CFBundleInfoDictionaryVersion</key>
    <string>6.0</string>
    <key>CFBundleName</key>
    <string>EasySSH ${{ matrix.version }}</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>$VERSION_NO_V</string>
    <key>CFBundleVersion</key>
    <string>$VERSION_NO_V</string>
    <key>LSMinimumSystemVersion</key>
    <string>13.0</string>
    <key>LSApplicationCategoryType</key>
    <string>public.app-category.utilities</string>
</dict>
</plist>
EOF

          # Create DMG
          ln -sf /Applications "$PKG_DIR/Applications"
          hdiutil create -volname "EasySSH ${{ matrix.version }}" -srcfolder "$PKG_DIR" \
            -ov -format UDZO "$RELEASE_DIR/$PKG_NAME.dmg" || true

      - name: Code Sign (macOS)
        if: github.event.inputs.skip_signing != 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "No macOS certificate provided, skipping signing"
            exit 0
          fi

          VERSION="${{ needs.version.outputs.version }}"
          VER_TYPE="${{ matrix.version }}"
          RELEASE_DIR="releases/$VER_TYPE-$VERSION"
          PKG_NAME="easyssh-$VER_TYPE-$VERSION-macos-universal"
          APP_PATH="$RELEASE_DIR/$PKG_NAME/EasySSH.app"
          DMG_PATH="$RELEASE_DIR/$PKG_NAME.dmg"

          # Decode certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12

          # Create temporary keychain
          security create-keychain -p "$(openssl rand -base64 32)" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

          # Sign app
          if [ -d "$APP_PATH" ]; then
            codesign --force --deep --sign "Developer ID Application" --timestamp "$APP_PATH"
          fi

          # Sign DMG
          if [ -f "$DMG_PATH" ]; then
            codesign --force --sign "Developer ID Application" --timestamp "$DMG_PATH"
          fi

          # Notarize (if credentials available)
          if [ -n "$MACOS_NOTARIZATION_APPLE_ID" ] && [ -f "$DMG_PATH" ]; then
            xcrun notarytool submit "$DMG_PATH" --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
              --team-id "$MACOS_NOTARIZATION_TEAM_ID" --password "$MACOS_NOTARIZATION_PASSWORD" --wait
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.version }}-universal
          path: releases/${{ matrix.version }}-${{ needs.version.outputs.version }}/*.dmg
          if-no-files-found: ignore
          retention-days: 30

  # ============================================================================
  # Build Pro Server (Docker + Binary)
  # ============================================================================
  build-pro-server:
    name: Pro Server
    needs: [version, test-suite, security-checks]
    if: needs.version.outputs.build_pro == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            target: x86_64-unknown-linux-gnu
            cross: false
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross (for ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: pro-server-${{ matrix.arch }}

      - name: Build Pro Server
        working-directory: crates/easyssh-pro-server
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package Pro Server
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          RELEASE_DIR="releases/pro-$VERSION"
          PKG_NAME="easyssh-pro-server-$VERSION-linux-$ARCH"

          mkdir -p "$RELEASE_DIR/$PKG_NAME"

          if [ "${{ matrix.cross }}" = "true" ]; then
            cp "target/${{ matrix.target }}/release/easyssh-pro-server" "$RELEASE_DIR/$PKG_NAME/"
          else
            cp "target/release/easyssh-pro-server" "$RELEASE_DIR/$PKG_NAME/"
          fi
          chmod +x "$RELEASE_DIR/$PKG_NAME/easyssh-pro-server"

          # Create systemd service file
          cat > "$RELEASE_DIR/$PKG_NAME/easyssh-pro.service" << EOF
[Unit]
Description=EasySSH Pro Server
After=network.target

[Service]
Type=simple
User=easyssh
ExecStart=/usr/local/bin/easyssh-pro-server
Restart=on-failure
RestartSec=5

[Install]
WantedBy=multi-user.target
EOF

          # Create README
          cat > "$RELEASE_DIR/$PKG_NAME/README.txt" << EOF
EasySSH Pro Server $VERSION for Linux ($ARCH)
==============================================

Quick Start:
1. Copy binary to /usr/local/bin/
2. Create user: sudo useradd -r -s /bin/false easyssh
3. Copy service file: sudo cp easyssh-pro.service /etc/systemd/system/
4. Enable service: sudo systemctl enable --now easyssh-pro

Docker:
  docker run -p 8080:8080 anixops/easyssh-pro:$VERSION

For support: https://github.com/anixops/easyssh
EOF

          cd "$RELEASE_DIR"
          tar -czf "$PKG_NAME.tar.gz" "$PKG_NAME"
          cd "$GITHUB_WORKSPACE"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pro-server-${{ matrix.arch }}
          path: releases/pro-${{ needs.version.outputs.version }}/*.tar.gz
          retention-days: 30

  # ============================================================================
  # Generate Release Notes & Checksums
  # ============================================================================
  prepare-release:
    name: Prepare Release
    needs: [version, build-windows, build-linux, build-macos, build-pro-server]
    runs-on: ubuntu-latest
    outputs:
      release_notes: ${{ steps.notes.outputs.content }}

    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*-${{ needs.version.outputs.version }}*"

      - name: Generate Release Notes
        id: notes
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          VERSION_NO_V="${{ needs.version.outputs.version_no_v }}"
          CHANNEL="${{ needs.version.outputs.channel }}"
          BUILD_LITE="${{ needs.version.outputs.build_lite }}"
          BUILD_STANDARD="${{ needs.version.outputs.build_standard }}"
          BUILD_PRO="${{ needs.version.outputs.build_pro }}"

          # Generate changelog section
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1 > changelog_section.md || true
          fi

          cat > release_notes.md << EOF
## EasySSH Release $VERSION

**Channel:** $CHANNEL
**Version:** $VERSION_NO_V

EOF

          # Add changelog section if exists
          if [ -f changelog_section.md ] && [ -s changelog_section.md ]; then
            cat changelog_section.md >> release_notes.md
          else
            echo "### Changes" >> release_notes.md
            echo "" >> release_notes.md
            git log --oneline --no-decorate -20 >> release_notes.md || true
          fi

          cat >> release_notes.md << EOF

### Downloads

EOF

          # Lite downloads
          if [ "$BUILD_LITE" = "true" ]; then
            cat >> release_notes.md << EOF
#### EasySSH Lite - Configuration Management
| Platform | Package | Architecture |
|----------|---------|--------------|
| Windows x64 | easyssh-lite-$VERSION-windows-x64.zip / .msi | AMD64 |
| Windows ARM64 | easyssh-lite-$VERSION-windows-arm64.zip / .msi | ARM64 |
| Linux x64 | easyssh-lite-$VERSION-linux-x64.tar.gz | x86_64 |
| Linux ARM64 | easyssh-lite-$VERSION-linux-arm64.tar.gz | aarch64 |
| macOS Universal | easyssh-lite-$VERSION-macos-universal.dmg | Intel + Apple Silicon |

**Features:** SSH configuration management, password/key auth, native UI, secure storage

EOF
          fi

          # Standard downloads
          if [ "$BUILD_STANDARD" = "true" ]; then
            cat >> release_notes.md << EOF
#### EasySSH Standard - Full-Featured Client
| Platform | Package | Architecture |
|----------|---------|--------------|
| Windows x64 | easyssh-standard-$VERSION-windows-x64.zip / .msi | AMD64 |
| Windows ARM64 | easyssh-standard-$VERSION-windows-arm64.zip / .msi | ARM64 |
| Linux x64 | easyssh-standard-$VERSION-linux-x64.tar.gz | x86_64 |
| Linux ARM64 | easyssh-standard-$VERSION-linux-arm64.tar.gz | aarch64 |
| macOS Universal | easyssh-standard-$VERSION-macos-universal.dmg | Intel + Apple Silicon |

**Features:** Embedded terminal, split panes, SFTP, monitoring widgets

EOF
          fi

          # Pro downloads
          if [ "$BUILD_PRO" = "true" ]; then
            cat >> release_notes.md << EOF
#### EasySSH Pro - Team Collaboration
| Platform | Package | Architecture |
|----------|---------|--------------|
| Windows x64 | easyssh-pro-$VERSION-windows-x64.zip / .msi | AMD64 |
| Linux x64 | easyssh-pro-$VERSION-linux-x64.tar.gz | x86_64 |
| Linux ARM64 | easyssh-pro-$VERSION-linux-arm64.tar.gz | aarch64 |
| Pro Server x64 | easyssh-pro-server-$VERSION-linux-x64.tar.gz | Server Binary |
| Pro Server ARM64 | easyssh-pro-server-$VERSION-linux-arm64.tar.gz | Server Binary |
| Docker | \\\"anixops/easyssh-pro:$VERSION\\\" | Multi-arch |

**Features:** Team management, RBAC, SSO (SAML/OIDC), audit logging, shared snippets

EOF
          fi

          cat >> release_notes.md << EOF

### System Requirements

- **Windows:** Windows 10/11 x64 or ARM64
- **Linux:** GTK4, libadwaita, 64-bit distribution (glibc 2.31+)
- **macOS:** macOS 13.0+, Apple Silicon or Intel
- **Pro Server:** Docker 20.10+ or systemd-based Linux

### Verification

SHA256 checksums are available in \\\"SHA256SUMS.txt\\\" attached to this release.

\`\`\`bash
# Verify download
sha256sum -c SHA256SUMS.txt
\`\`\`

### Installation

**Windows:**
- ZIP: Extract and run \\\"EasySSH.exe\\\"
- MSI: Run installer for system-wide installation

**Linux:**
\`\`\`bash
# User install
./install.sh

# System install
sudo ./install.sh /usr/local
\`\`\`

**macOS:**
Open DMG and drag \\\"EasySSH.app\\\" to Applications

**Pro Server:**
\`\`\`bash
docker run -p 8080:8080 anixops/easyssh-pro:$VERSION
\`\`\`

---
Built with ❤️ by the EasySSH Team
EOF

          cat release_notes.md
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.dmg" -o -name "*.msi" \) -exec sha256sum {} \; > ../SHA256SUMS.txt
          cd ..
          cat SHA256SUMS.txt

      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: SHA256SUMS.txt
          retention-days: 30

  # ============================================================================
  # Create GitHub Release
  # ============================================================================
  create-release:
    name: Create GitHub Release
    needs: [version, prepare-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect All Release Files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.dmg" -o -name "*.msi" \) -exec cp {} release-files/ \;
          cp SHA256SUMS.txt release-files/ 2>/dev/null || true
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: EasySSH ${{ needs.version.outputs.version }}
          body: ${{ needs.prepare-release.outputs.release_notes }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ needs.version.outputs.is_prerelease }}
          files: |
            release-files/*.zip
            release-files/*.tar.gz
            release-files/*.dmg
            release-files/*.msi
            release-files/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Release Manifest
        run: |
          cat > release-manifest.json << EOF
          {
            "version": "${{ needs.version.outputs.version }}",
            "version_no_prefix": "${{ needs.version.outputs.version_no_v }}",
            "channel": "${{ needs.version.outputs.channel }}",
            "release_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows": {
                "lite": {
                  "x64": {
                    "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-lite-${{ needs.version.outputs.version }}-windows-x64.zip",
                    "msi_url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-lite-${{ needs.version.outputs.version }}-windows-x64.msi"
                  },
                  "arm64": {
                    "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-lite-${{ needs.version.outputs.version }}-windows-arm64.zip",
                    "msi_url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-lite-${{ needs.version.outputs.version }}-windows-arm64.msi"
                  }
                },
                "standard": {
                  "x64": {
                    "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-standard-${{ needs.version.outputs.version }}-windows-x64.zip",
                    "msi_url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-standard-${{ needs.version.outputs.version }}-windows-x64.msi"
                  },
                  "arm64": {
                    "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-standard-${{ needs.version.outputs.version }}-windows-arm64.zip",
                    "msi_url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-standard-${{ needs.version.outputs.version }}-windows-arm64.msi"
                  }
                }
              },
              "linux": {
                "lite": {
                  "x64": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-lite-${{ needs.version.outputs.version }}-linux-x64.tar.gz",
                  "arm64": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-lite-${{ needs.version.outputs.version }}-linux-arm64.tar.gz"
                },
                "standard": {
                  "x64": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-standard-${{ needs.version.outputs.version }}-linux-x64.tar.gz",
                  "arm64": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-standard-${{ needs.version.outputs.version }}-linux-arm64.tar.gz"
                },
                "pro": {
                  "x64": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-pro-${{ needs.version.outputs.version }}-linux-x64.tar.gz",
                  "arm64": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-pro-${{ needs.version.outputs.version }}-linux-arm64.tar.gz"
                },
                "pro-server": {
                  "x64": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-pro-server-${{ needs.version.outputs.version }}-linux-x64.tar.gz",
                  "arm64": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-pro-server-${{ needs.version.outputs.version }}-linux-arm64.tar.gz"
                }
              },
              "macos": {
                "lite": {
                  "universal": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-lite-${{ needs.version.outputs.version }}-macos-universal.dmg"
                },
                "standard": {
                  "universal": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.version }}/easyssh-standard-${{ needs.version.outputs.version }}-macos-universal.dmg"
                }
              }
            }
          }
          EOF
          cat release-manifest.json

      - name: Upload Manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json

  # ============================================================================
  # Publish Docker Images (Pro Server)
  # ============================================================================
  publish-docker:
    name: Publish Docker Images
    needs: [version, build-pro-server]
    if: needs.version.outputs.build_pro == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Pro Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/pro-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/easyssh-pro:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/easyssh-pro:${{ needs.version.outputs.version_no_v }}
            ${{ needs.version.outputs.channel == 'stable' && format('ghcr.io/{0}/easyssh-pro:latest', github.repository_owner) || '' }}
          platforms: linux/amd64,linux/arm64

  # ============================================================================
  # Notify Release
  # ============================================================================
  notify:
    name: Notify Release
    needs: [version, create-release]
    runs-on: ubuntu-latest
    if: always() && needs.create-release.result == 'success'

    steps:
      - name: Post to Slack
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 EasySSH ${{ needs.version.outputs.version }} Released!",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "New Release: ${{ needs.version.outputs.version }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Channel:* ${{ needs.version.outputs.channel }}\n*Versions:* ${{ needs.version.outputs.build_lite == 'true' && 'Lite ' || '' }}${{ needs.version.outputs.build_standard == 'true' && 'Standard ' || '' }}${{ needs.version.outputs.build_pro == 'true' && 'Pro' || '' }}\n*Release URL:* https://github.com/${{ github.repository }}/releases/tag/${{ needs.version.outputs.version }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Summary
        run: |
          echo "# Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Channel:** ${{ needs.version.outputs.channel }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Built Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.version.outputs.build_lite }}" = "true" ]; then
            echo "- ✅ EasySSH Lite" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.version.outputs.build_standard }}" = "true" ]; then
            echo "- ✅ EasySSH Standard" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.version.outputs.build_pro }}" = "true" ]; then
            echo "- ✅ EasySSH Pro" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/${{ needs.version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
