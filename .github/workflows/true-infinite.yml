name: Infinite Retry Until Success

on:
  push:
    branches: [main]
  schedule:
    # 每10分钟触发一次（如果还在运行中则跳过）
    - cron: '*/10 * * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# 并发控制 - 确保只有一个实例运行
concurrency:
  group: infinite-build
  cancel-in-progress: false

jobs:
  # 真正的无限重试 - 使用while true循环
  infinite-build:
    name: Build Until Success (Infinite)
    runs-on: ubuntu-latest
    # 设置超长时间限制（6小时）
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Setup Retry Loop
        run: |
          echo "============================================"
          echo "INFINITE BUILD LOOP"
          echo "Will retry until success"
          echo "============================================"

          ITERATION=0

          while true; do
            ITERATION=$((ITERATION + 1))

            echo ""
            echo "============================================"
            echo "ITERATION $ITERATION"
            echo "============================================"

            # Try to build
            if cargo build --release -p easyssh-core -p easyssh-tui 2>&1 | tee build.log; then
              # Build succeeded, now test
              if cargo test --release -p easyssh-core 2>&1 | tee -a build.log; then
                echo ""
                echo "============================================"
                echo "✅ SUCCESS AFTER $ITERATION ATTEMPTS!"
                echo "============================================"
                echo "iteration=$ITERATION" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi

            # Build failed, apply fixes
            echo "❌ Failed on iteration $ITERATION"
            echo "Applying fixes..."

            # Fix 1: Clean and update
            cargo clean 2>/dev/null || true
            cargo update 2>&1 | tail -5 || true

            # Fix 2: Format code
            cargo fmt 2>/dev/null || true

            # Fix 3: Auto-fix
            rustup component add clippy rustfmt 2>/dev/null || true
            cargo clippy --fix --allow-dirty --allow-staged -p easyssh-core 2>&1 | grep -E "(Fixing|error)" || true
            cargo fix --allow-dirty --allow-staged -p easyssh-core 2>&1 | grep -E "(Fixing|error)" || true

            # Wait before retry
            echo "Waiting 10 seconds before retry..."
            echo "(Push new commit to trigger fresh start)"
            sleep 10

            # Check if we've been running too long (5 hours = 300 minutes)
            # GitHub Actions will kill us at 6 hours anyway
            if [ $ITERATION -gt 1000 ]; then
              echo "Reached 1000 iterations, stopping to prevent resource waste"
              echo "Last error:"
              tail -50 build.log
              exit 1
            fi
          done
        continue-on-error: true

      - name: Report Status
        if: always()
        run: |
          if [ -f build.log ]; then
            echo "Build log excerpt:"
            tail -100 build.log || true
          fi

  # 状态监控任务 - 每5分钟检查一次是否需要触发新的构建
  watchdog:
    name: Watchdog Trigger
    runs-on: ubuntu-latest
    needs: infinite-build
    if: failure()  # 只在构建失败时触发

    steps:
      - name: Trigger New Run
        run: |
          echo "Build failed. Scheduling retry..."
          echo "This workflow will be re-triggered by cron in ~10 minutes"
          # 使用API触发新workflow run
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/fix-until-success.yml/dispatches \
            -d '{"ref":"main"}' || true
        continue-on-error: true
