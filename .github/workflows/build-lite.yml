name: Build Lite Version

on:
  push:
    tags:
      - 'lite-v[0-9]+.[0-9]+.[0-9]+'
      - 'lite-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      - 'lite-v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
      - 'lite-v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v0.3.0)'
        required: true
        type: string
      create_draft:
        description: 'Create as draft release?'
        required: false
        type: boolean
        default: true
      skip_signing:
        description: 'Skip code signing step?'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Extract Version
  # ============================================================================
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_no_v: ${{ steps.get_version.outputs.version_no_v }}
      is_lite_tag: ${{ steps.get_version.outputs.is_lite_tag }}
      channel: ${{ steps.get_version.outputs.channel }}

    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi

          # Handle both lite-vX.Y.Z and vX.Y.Z formats
          if [[ "$VERSION" == lite-v* ]]; then
            VERSION_NO_V="${VERSION#lite-v}"
            IS_LITE_TAG="true"
          else
            VERSION_NO_V="${VERSION#v}"
            IS_LITE_TAG="true"
          fi

          # Determine channel
          if [[ "$VERSION" == *"alpha"* ]]; then
            CHANNEL="alpha"
          elif [[ "$VERSION" == *"beta"* ]]; then
            CHANNEL="beta"
          elif [[ "$VERSION" == *"rc"* ]]; then
            CHANNEL="rc"
          else
            CHANNEL="stable"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_no_v=$VERSION_NO_V" >> $GITHUB_OUTPUT
          echo "is_lite_tag=$IS_LITE_TAG" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

          echo "Version: $VERSION"
          echo "Channel: $CHANNEL"

  # ============================================================================
  # Build Windows (x64, ARM64)
  # ============================================================================
  build-windows:
    name: Build Windows ${{ matrix.arch }}
    needs: version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc
            rust_target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-${{ matrix.arch }}-lite
          workspaces: ". -> target"

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows Lite
        working-directory: crates/easyssh-platforms/windows/easyssh-winui
        env:
          EASYSSH_VERSION: ${{ needs.version.outputs.version_no_v }}
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cargo build --profile release-lite --target ${{ matrix.rust_target }} --features lite --no-default-features

      - name: Package Windows
        shell: pwsh
        run: |
          $Version = "${{ needs.version.outputs.version_no_v }}"
          $Arch = "${{ matrix.arch }}"
          $ReleaseDir = "releases/lite-v$Version"
          $PkgName = "easyssh-lite-v$Version-windows-$Arch"
          $PkgDir = "$ReleaseDir/$PkgName"

          New-Item -ItemType Directory -Force -Path $PkgDir | Out-Null

          # Copy binary
          $SrcBinary = "crates/easyssh-platforms/windows/easyssh-winui/target/${{ matrix.rust_target }}/release-lite/EasySSH.exe"
          $DestBinary = "$PkgDir/EasySSH Lite.exe"
          Copy-Item $SrcBinary $DestBinary -Force

          # Create README
          $ReadmeLines = @(
            "EasySSH Lite v$Version for Windows ($Arch)",
            "==============================================",
            "",
            "Quick Start:",
            "1. Run 'EasySSH Lite.exe'",
            "2. Add your SSH servers via the UI",
            "3. Connect using password or key authentication",
            "",
            "System Requirements:",
            "- Windows 10/11 ${{ matrix.arch == 'arm64' && 'ARM64' || '64-bit' }}",
            "- No additional dependencies required",
            "",
            "Features:",
            "- Native Windows UI with egui",
            "- SSH connection management",
            "- Password and key-based authentication",
            "- Server grouping",
            "- Secure credential storage via Windows Credential Manager",
            "",
            "For support: https://github.com/anixops/easyssh",
            "",
            "Version: $Version",
            "Built: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          )
          $ReadmeLines | Out-File -FilePath "$PkgDir/README.txt" -Encoding utf8

          # Create ZIP
          Compress-Archive -Path "$PkgDir/*" -DestinationPath "$ReleaseDir/$PkgName.zip" -Force

          # Create MSI using WiX
          if (Test-Path "C:\Program Files (x86)\WiX Toolset v3.11\bin\candle.exe") {
            $WxsPath = "$ReleaseDir/wix-$Arch.wxs"
            $WixXml = "<?xml version='1.0' encoding='UTF-8?>"
            $WixXml += "<Wix xmlns='http://schemas.microsoft.com/wix/2006/wi'>"
            $WixXml += "<Product Id='*' Name='EasySSH Lite' Language='1033' Version='$Version' Manufacturer='AnixOps' UpgradeCode='E3F5A2B7-8C9D-4E1F-2A3B-5C6D7E8F9A0B'>"
            $WixXml += "<Package InstallerVersion='200' Compressed='yes' InstallScope='perMachine' Platform='${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}' />"
            $WixXml += "<MajorUpgrade DowngradeErrorMessage='A newer version of [ProductName] is already installed.' />"
            $WixXml += "<MediaTemplate EmbedCab='yes' />"
            $WixXml += "<Feature Id='ProductFeature' Title='EasySSH Lite' Level='1'><ComponentRef Id='MainExecutable' /></Feature>"
            $WixXml += "<Directory Id='TARGETDIR' Name='SourceDir'>"
            $WixXml += "<Directory Id='${{ matrix.arch == 'arm64' && 'ProgramFiles64Folder' || 'ProgramFilesFolder' }}'>"
            $WixXml += "<Directory Id='APPLICATIONFOLDER' Name='EasySSH Lite'>"
            $WixXml += "<Component Id='MainExecutable' Guid='*'>"
            $DestBinaryEscaped = $DestBinary -replace '\\', '\\'
            $WixXml += "<File Id='EasySSHLiteExe' Source='$DestBinaryEscaped' KeyPath='yes'>"
            $WixXml += "<Shortcut Id='StartMenuShortcut' Directory='ProgramMenuFolder' Name='EasySSH Lite' WorkingDirectory='APPLICATIONFOLDER' Icon='EasySSHLite.exe' Advertise='yes' />"
            $WixXml += "</File></Component></Directory></Directory>"
            $WixXml += "<Directory Id='ProgramMenuFolder' Name='Programs' /></Directory>"
            $WixXml += "<Icon Id='EasySSHLite.exe' SourceFile='$DestBinaryEscaped' />"
            $WixXml += "<Property Id='ARPPRODUCTICON' Value='EasySSHLite.exe' />"
            $WixXml += "</Product></Wix>"
            $WixXml | Set-Content $WxsPath -Encoding UTF8

            & "C:\Program Files (x86)\WiX Toolset v3.11\bin\candle.exe" -out "$ReleaseDir/wix-$Arch.wixobj" $WxsPath -arch ${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}
            & "C:\Program Files (x86)\WiX Toolset v3.11\bin\light.exe" -out "$ReleaseDir/$PkgName.msi" "$ReleaseDir/wix-$Arch.wixobj" -ext WixUIExtension
          }

      - name: Code Signing (Optional)
        if: ${{ github.event.inputs.skip_signing != 'true' }}
        shell: pwsh
        run: |
          # Check if signing certificate is available
          if ($env:CERTIFICATE_THUMBPRINT) {
            Write-Host "Signing executable..."
            $Version = "${{ needs.version.outputs.version_no_v }}"
            $Arch = "${{ matrix.arch }}"
            $ExePath = "releases/lite-v$Version/easyssh-lite-v$Version-windows-$Arch/EasySSH Lite.exe"

            if (Test-Path $ExePath) {
              signtool.exe sign /sha1 $env:CERTIFICATE_THUMBPRINT /tr http://timestamp.digicert.com /td sha256 /fd sha256 "$ExePath"
              signtool.exe verify /pa "$ExePath"
            }
          } else {
            Write-Host "No certificate thumbprint provided, skipping signing"
          }
        env:
          CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-${{ matrix.arch }}-lite
          path: |
            releases/lite-v${{ needs.version.outputs.version_no_v }}/*.zip
            releases/lite-v${{ needs.version.outputs.version_no_v }}/*.msi
          if-no-files-found: ignore
          retention-days: 30

  # ============================================================================
  # Build Linux (x64, ARM64)
  # ============================================================================
  build-linux:
    name: Build Linux ${{ matrix.arch }}
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-unknown-linux-gnu
            cross: false
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            cross: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross (for ARM64)
        if: matrix.cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-${{ matrix.arch }}-lite
          workspaces: ". -> target"

      - name: Build Linux Lite
        working-directory: crates/easyssh-platforms/linux/easyssh-gtk4
        env:
          EASYSSH_VERSION: ${{ needs.version.outputs.version_no_v }}
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --profile release-lite --target ${{ matrix.target }} --features easyssh-core/lite --no-default-features
          else
            cargo build --profile release-lite --target ${{ matrix.target }} --features easyssh-core/lite --no-default-features
          fi

      - name: Package Linux
        run: |
          VERSION="${{ needs.version.outputs.version_no_v }}"
          ARCH="${{ matrix.arch }}"
          TARGET="${{ matrix.target }}"
          RELEASE_DIR="releases/lite-v$VERSION"
          PKG_NAME="easyssh-lite-v$VERSION-linux-$ARCH"
          PKG_DIR="$RELEASE_DIR/$PKG_NAME"

          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/share/applications"

          # Copy binary
          if [ "${{ matrix.cross }}" = "true" ]; then
            cp "target/$TARGET/release-lite/easyssh-gtk4" "$PKG_DIR/usr/bin/easyssh-lite"
          else
            cp "target/release-lite/easyssh-gtk4" "$PKG_DIR/usr/bin/easyssh-lite"
          fi
          chmod +x "$PKG_DIR/usr/bin/easyssh-lite"

          # Create desktop entry
          mkdir -p "$PKG_DIR/usr/share/applications"
          echo "[Desktop Entry]" > "$PKG_DIR/usr/share/applications/easyssh-lite.desktop"
          echo "Name=EasySSH Lite" >> "$PKG_DIR/usr/share/applications/easyssh-lite.desktop"
          echo "Comment=Lightweight SSH Configuration Manager" >> "$PKG_DIR/usr/share/applications/easyssh-lite.desktop"
          echo "Exec=/usr/bin/easyssh-lite" >> "$PKG_DIR/usr/share/applications/easyssh-lite.desktop"
          echo "Icon=easyssh-lite" >> "$PKG_DIR/usr/share/applications/easyssh-lite.desktop"
          echo "Type=Application" >> "$PKG_DIR/usr/share/applications/easyssh-lite.desktop"
          echo "Categories=Network;RemoteAccess;" >> "$PKG_DIR/usr/share/applications/easyssh-lite.desktop"
          echo "Terminal=false" >> "$PKG_DIR/usr/share/applications/easyssh-lite.desktop"
          echo "Version=$VERSION" >> "$PKG_DIR/usr/share/applications/easyssh-lite.desktop"

          # Create install script
          mkdir -p "$PKG_DIR"
          printf '#!/bin/bash\nset -e\nINSTALL_PREFIX="${1:-$HOME/.local}"\n\nif [ "$EUID" -ne 0 ] && [ "$INSTALL_PREFIX" = "/usr/local" ]; then\n    echo "Installing to user directory..."\n    mkdir -p "$HOME/.local/bin"\n    mkdir -p "$HOME/.local/share/applications"\n    cp usr/bin/easyssh-lite "$HOME/.local/bin/"\n    cp usr/share/applications/easyssh-lite.desktop "$HOME/.local/share/applications/"\n    chmod +x "$HOME/.local/bin/easyssh-lite"\n    echo "EasySSH Lite installed to ~/.local/bin/"\nelse\n    echo "Installing to $INSTALL_PREFIX..."\n    mkdir -p "${INSTALL_PREFIX}/bin"\n    cp usr/bin/easyssh-lite "${INSTALL_PREFIX}/bin/"\n    chmod +x "${INSTALL_PREFIX}/bin/easyssh-lite"\n    echo "EasySSH Lite installed to ${INSTALL_PREFIX}/bin/"\nfi\n\necho "Run '"'"'easyssh-lite'"'"' to start."\n' > "$PKG_DIR/install.sh"
          chmod +x "$PKG_DIR/install.sh"

          # Create README
          echo "EasySSH Lite v$VERSION for Linux ($ARCH)" > "$PKG_DIR/README.txt"
          echo "=========================================" >> "$PKG_DIR/README.txt"
          echo "" >> "$PKG_DIR/README.txt"
          echo "Quick Start:" >> "$PKG_DIR/README.txt"
          echo "1. Run ./install.sh (user install) or sudo ./install.sh (system install)" >> "$PKG_DIR/README.txt"
          echo "2. Run 'easyssh-lite' to start" >> "$PKG_DIR/README.txt"
          echo "" >> "$PKG_DIR/README.txt"
          echo "System Requirements:" >> "$PKG_DIR/README.txt"
          echo "- GTK4 runtime" >> "$PKG_DIR/README.txt"
          echo "- libadwaita runtime" >> "$PKG_DIR/README.txt"
          echo "- 64-bit Linux distribution" >> "$PKG_DIR/README.txt"
          echo "" >> "$PKG_DIR/README.txt"
          echo "For support: https://github.com/anixops/easyssh" >> "$PKG_DIR/README.txt"

          # Create tarball
          cd "$RELEASE_DIR"
          tar -czf "$PKG_NAME.tar.gz" "$PKG_NAME"
          cd "$GITHUB_WORKSPACE"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}-lite
          path: releases/lite-v${{ needs.version.outputs.version_no_v }}/*.tar.gz
          retention-days: 30

  # ============================================================================
  # Build macOS (Universal Binary)
  # ============================================================================
  build-macos:
    name: Build macOS Universal
    needs: version
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-universal-lite
          workspaces: ". -> target"

      - name: Build macOS Core (x86_64)
        working-directory: crates/easyssh-core
        env:
          EASYSSH_VERSION: ${{ needs.version.outputs.version_no_v }}
        run: |
          cargo build --profile release-lite --target x86_64-apple-darwin --features lite --no-default-features

      - name: Build macOS Core (arm64)
        working-directory: crates/easyssh-core
        env:
          EASYSSH_VERSION: ${{ needs.version.outputs.version_no_v }}
        run: |
          cargo build --profile release-lite --target aarch64-apple-darwin --features lite --no-default-features

      - name: Build SwiftUI App (if exists)
        working-directory: platforms/macos/EasySSH
        continue-on-error: true
        run: |
          if [ -f "Package.swift" ]; then
            swift build -c release --arch x86_64
            swift build -c release --arch arm64
          fi

      - name: Package macOS
        run: |
          VERSION="${{ needs.version.outputs.version_no_v }}"
          RELEASE_DIR="releases/lite-v$VERSION"
          PKG_NAME="easyssh-lite-v$VERSION-macos-universal"
          PKG_DIR="$RELEASE_DIR/$PKG_NAME"

          mkdir -p "$PKG_DIR/EasySSH Lite.app/Contents/MacOS"
          mkdir -p "$PKG_DIR/EasySSH Lite.app/Contents/Resources"

          # Create universal binary from core library
          # (In a full implementation, this would be the actual app binary)
          lipo -create \
            "target/x86_64-apple-darwin/release-lite/libeasyssh_core.a" \
            "target/aarch64-apple-darwin/release-lite/libeasyssh_core.a" \
            -output "$PKG_DIR/EasySSH Lite.app/Contents/MacOS/EasySSH Lite" 2>/dev/null || true

          # If we have the SwiftUI app, use that instead
          SWIFT_BUILD="platforms/macos/EasySSH/.build/release"
          if [ -f "$SWIFT_BUILD/EasySSH" ]; then
            cp "$SWIFT_BUILD/EasySSH" "$PKG_DIR/EasySSH Lite.app/Contents/MacOS/"
          elif [ -f "target/universal-apple-darwin/release-lite/EasySSH" ]; then
            cp "target/universal-apple-darwin/release-lite/EasySSH" "$PKG_DIR/EasySSH Lite.app/Contents/MacOS/"
          fi

          chmod +x "$PKG_DIR/EasySSH Lite.app/Contents/MacOS/EasySSH Lite" 2>/dev/null || true

          # Create Info.plist
          echo '<?xml version="1.0" encoding="UTF-8"?>' > "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '<plist version="1.0">' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '<dict>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <key>CFBundleDevelopmentRegion</key>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <string>en</string>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <key>CFBundleExecutable</key>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <string>EasySSH Lite</string>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <key>CFBundleIdentifier</key>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <string>com.anixops.easyssh-lite</string>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <key>CFBundleInfoDictionaryVersion</key>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <string>6.0</string>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <key>CFBundleName</key>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <string>EasySSH Lite</string>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <key>CFBundlePackageType</key>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <string>APPL</string>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <key>CFBundleShortVersionString</key>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo "    <string>$VERSION</string>" >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <key>CFBundleVersion</key>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo "    <string>$VERSION</string>" >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <key>LSMinimumSystemVersion</key>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <string>13.0</string>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <key>LSApplicationCategoryType</key>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '    <string>public.app-category.utilities</string>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '</dict>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"
          echo '</plist>' >> "$PKG_DIR/EasySSH Lite.app/Contents/Info.plist"

          # Create DMG
          ln -sf /Applications "$PKG_DIR/Applications"
          hdiutil create -volname "EasySSH Lite" -srcfolder "$PKG_DIR" \
            -ov -format UDZO "$RELEASE_DIR/$PKG_NAME.dmg" || true

      - name: Code Sign (macOS)
        if: ${{ github.event.inputs.skip_signing != 'true' && env.MACOS_CERTIFICATE != '' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          VERSION="${{ needs.version.outputs.version_no_v }}"
          PKG_NAME="easyssh-lite-v$VERSION-macos-universal"
          APP_PATH="releases/lite-v$VERSION/$PKG_NAME/EasySSH Lite.app"

          if [ -d "$APP_PATH" ]; then
            echo "Signing application..."
            codesign --force --deep --sign "Developer ID Application" "$APP_PATH" || true
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-universal-lite
          path: releases/lite-v${{ needs.version.outputs.version_no_v }}/*.dmg
          if-no-files-found: ignore
          retention-days: 30

  # ============================================================================
  # Generate Checksums and Create Release
  # ============================================================================
  create-release:
    name: Create GitHub Release
    needs: [version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "*-lite"

      - name: Organize Artifacts
        run: |
          VERSION="${{ needs.version.outputs.version_no_v }}"
          RELEASE_DIR="releases/lite-v$VERSION"
          mkdir -p "$RELEASE_DIR"

          # Move all artifacts to release directory
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.dmg" -o -name "*.msi" \) -exec cp {} "$RELEASE_DIR/" \;

      - name: Generate Checksums
        run: |
          VERSION="${{ needs.version.outputs.version_no_v }}"
          RELEASE_DIR="releases/lite-v$VERSION"

          cd "$RELEASE_DIR"
          echo "EasySSH Lite v$VERSION Release Checksums" > SHA256SUMS.txt
          echo "=========================================" >> SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt

          for file in *.zip *.tar.gz *.dmg *.msi; do
            if [ -f "$file" ]; then
              sha256sum "$file" >> SHA256SUMS.txt
            fi
          done

          cd "$GITHUB_WORKSPACE"

      - name: Generate Release Notes
        run: |
          VERSION="${{ needs.version.outputs.version_no_v }}"
          CHANNEL="${{ needs.version.outputs.channel }}"

          echo "## EasySSH Lite v$VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "**Channel:** $CHANNEL" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Downloads" >> release_notes.md
          echo "" >> release_notes.md
          echo "| Platform | Package | Notes |" >> release_notes.md
          echo "|----------|---------|-------|" >> release_notes.md
          echo "| Windows x64 | easyssh-lite-v$VERSION-windows-x64.zip | Portable executable |" >> release_notes.md
          echo "| Windows x64 | easyssh-lite-v$VERSION-windows-x64.msi | Installer (if available) |" >> release_notes.md
          echo "| Windows ARM64 | easyssh-lite-v$VERSION-windows-arm64.zip | Portable executable |" >> release_notes.md
          echo "| Linux x64 | easyssh-lite-v$VERSION-linux-x64.tar.gz | Portable tarball |" >> release_notes.md
