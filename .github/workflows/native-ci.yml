name: Native Platform CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'platforms/**'
      - 'core/**'
      - '.github/workflows/native-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'platforms/**'
      - 'core/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==================== Windows Native (egui) ====================
  windows-native:
    name: Windows Native (egui)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: platforms/windows/easyssh-winui

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build Debug
        run: cargo build

      - name: Build Release
        run: cargo build --release

      - name: Run Tests
        run: cargo test --all-features

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-egui
          path: |
            platforms/windows/easyssh-winui/target/debug/EasySSH.exe
            platforms/windows/easyssh-winui/target/release/EasySSH.exe
          if-no-files-found: warn

  # ==================== Linux Native (GTK4) ====================
  linux-native:
    name: Linux Native (GTK4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platforms/linux/easyssh-gtk4

    steps:
      - uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config \
            xvfb

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build Debug
        run: cargo build

      - name: Build Release
        run: cargo build --release

      - name: Run Tests (Headless)
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 3
          cargo test --all-features

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-gtk4
          path: |
            platforms/linux/easyssh-gtk4/target/debug/easyssh
            platforms/linux/easyssh-gtk4/target/release/easyssh
          if-no-files-found: warn

  # ==================== macOS Native (SwiftUI) ====================
  macos-native:
    name: macOS Native (SwiftUI)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: platforms/macos/EasySSH

    steps:
      - uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Core Library
        run: |
          cd ../../core
          cargo build --release
          mkdir -p target/include
          ls -la target/release/

      - name: Build Swift Package
        run: swift build

      - name: Run Swift Tests
        run: swift test

      - name: Build App Bundle
        run: |
          swift build -c release
          # Note: For full app bundle, use xcodebuild with proper project

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-swiftui
          path: |
            platforms/macos/EasySSH/.build/debug/
            platforms/macos/EasySSH/.build/release/
          if-no-files-found: warn

  # ==================== Core Library Tests ====================
  core-tests:
    name: Core Library Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Core
        run: cargo build --release -p easyssh-core

      - name: Run Core Tests
        run: cargo test --release -p easyssh-core

      - name: Core Clippy
        run: cargo clippy -p easyssh-core -- -D warnings

  # ==================== Cross-Platform Integration ====================
  cross-platform-integration:
    name: Cross-Platform Integration
    needs: [windows-native, linux-native, macos-native]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List Artifacts
        run: |
          echo "=== Build Artifacts ==="
          find artifacts -type f -exec ls -lh {} \;

      - name: Verify Artifacts
        run: |
          echo "Checking Windows build..."
          test -f artifacts/windows-egui/EasySSH.exe || echo "Windows binary not found"

          echo "Checking Linux build..."
          test -f artifacts/linux-gtk4/easyssh || echo "Linux binary not found"

          echo "Checking macOS build..."
          ls -la artifacts/macos-swiftui/ || echo "macOS build not found"

  # ==================== Documentation ====================
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config

      - name: Build Rust Docs
        run: |
          cargo doc --no-deps -p easyssh-core 2>/dev/null || true
          cargo doc --no-deps -p easyssh-tui 2>/dev/null || true

      - name: Build Platform Docs
        run: |
          cd platforms/windows/easyssh-winui && cargo doc --no-deps 2>/dev/null || true
          cd ../linux/easyssh-gtk4 && cargo doc --no-deps 2>/dev/null || true

      - name: Upload Documentation
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: target/doc
          if-no-files-found: warn
