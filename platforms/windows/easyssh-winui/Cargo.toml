[package]
name = "easyssh-winui"
version = "0.3.0"
edition = "2021"
authors = ["EasySSH Team"]
description = "EasySSH native client for Windows"
license = "MIT"

[[bin]]
name = "EasySSH"
path = "src/main.rs"

[dependencies]
# WinUI 3 - Windows App SDK (modern WinUI)
windows-app-sdk = { version = "0.2", optional = true }

# Windows API bindings
windows = { version = "0.52", features = [
    "UI_Xaml",
    "UI_Xaml_Controls",
    "UI_Xaml_Navigation",
    "UI_Xaml_Media",
    "ApplicationModel_Activation",
    "Foundation_Collections",
    "System",
] }
windows-core = "0.52"

# Win32 for native window handling
windows-sys = { version = "0.52", features = ["Win32_UI_WindowsAndMessaging", "Win32_System_Threading"] }
easyssh-core = { path = "../../../core" }

# Cross-platform UI - egui + winit
eframe = { version = "0.28", features = ["default"] }
egui = "0.28"

# Async
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
panic = "abort"
lto = true
opt-level = 3
strip = true
