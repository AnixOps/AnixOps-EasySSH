name: Docker Multi-Platform Builds

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms'
        default: 'linux/amd64,linux/arm64'
        required: false
      push:
        description: 'Push to registry'
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # Docker Build Matrix
  # ============================================================================
  docker-build:
    name: Docker Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: lite
            dockerfile: ./docker/lite/Dockerfile
            context: .
            tags: |
              type=semver,pattern={{version}},suffix=-lite
              type=raw,value=latest-lite,enable={{is_default_branch}}
          - variant: standard
            dockerfile: ./docker/standard/Dockerfile
            context: .
            tags: |
              type=semver,pattern={{version}},suffix=-standard
              type=raw,value=latest-standard,enable={{is_default_branch}}
          - variant: tui
            dockerfile: ./docker/tui/Dockerfile
            context: .
            tags: |
              type=semver,pattern={{version}},suffix=-tui
              type=raw,value=latest-tui,enable={{is_default_branch}}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-flags: --debug
          driver-opts: |
            image=moby/buildkit:master

      - name: Log in to Container Registry
        if: github.event.inputs.push == 'true' || github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ matrix.tags }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event.inputs.push == 'true' || github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.variant }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.variant }}
          cache-to: |
            type=gha,scope=${{ matrix.variant }},mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.variant }},mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            CARGO_NET_GIT_FETCH_WITH_CLI=true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true

  # ============================================================================
  # Merge and Push Multi-Platform Manifests
  # ============================================================================
  merge:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: docker-build
    if: ${{ github.event.inputs.push == 'true' || github.event_name != 'pull_request' }}

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Manifests
        run: |
          for variant in lite standard tui; do
            docker buildx imagetools create \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${variant} \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.docker-build.outputs.digest }}
          done

  # ============================================================================
  # Security Scan
  # ============================================================================
  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-lite
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Scan for Secrets
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-lite
          scanners: 'secret'
          format: 'table'
