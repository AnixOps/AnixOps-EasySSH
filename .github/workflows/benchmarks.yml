name: Performance Benchmarks

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'core/**'
      - 'Cargo.lock'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================================
  # Run Benchmarks
  # ============================================================================
  benchmark:
    name: Run Performance Benchmarks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: benchmark-${{ matrix.os }}

      - name: Install Benchmark Tools
        run: |
          cargo install cargo-criterion || true
          cargo install cargo-flamegraph || true

      - name: Download Previous Results
        uses: dawidd6/action-download-artifact@v3
        with:
          name: benchmark-results-${{ matrix.os }}
          path: previous
          if_no_artifact_found: ignore
          workflow_conclusion: success

      - name: Run Benchmarks
        run: |
          # Run criterion benchmarks
          cargo bench -p easyssh-core 2>&1 | tee benchmark-output.txt || true

          # Parse and format results
          if [ -f benchmark-output.txt ]; then
            echo "=== Benchmark Results ==="
            cat benchmark-output.txt
          fi

      - name: Compare with Previous
        if: hashFiles('previous/benchmark-results.json') != ''
        run: |
          echo "=== Performance Comparison ==="
          # Add comparison logic here
          # cargo bench -p easyssh-core -- --baseline previous

      - name: Generate Flamegraph
        if: runner.os == 'Linux'
        run: |
          cargo flamegraph -p easyssh-core --root || true

      - name: Format Results
        id: format
        run: |
          cat > benchmark-results.json << 'EOF'
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "os": "${{ matrix.os }}",
            "results": {}
          }
          EOF

          # Parse criterion results if available
          if [ -d target/criterion ]; then
            echo "Found criterion results"
            # Parse criterion report
          fi

      - name: Upload Results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ matrix.os }}
          path: |
            benchmark-results.json
            target/criterion/
            flamegraph.svg
          retention-days: 90

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('benchmark-output.txt', 'utf8');

            const body = `## 📊 Performance Benchmark Results

            **OS:** ${{ matrix.os }}
            **Commit:** ${{ github.sha }}

            \`\`\`
            ${results.substring(0, 3000)}
            \`\`\`

            ${results.length > 3000 ? '_(truncated)_' : ''}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ============================================================================
  # Performance Regression Detection
  # ============================================================================
  regression-detection:
    name: Detect Performance Regression
    runs-on: ubuntu-latest
    needs: benchmark

    steps:
      - uses: actions/checkout@v6

      - name: Download All Benchmark Results
        uses: actions/download-artifact@v8
        with:
          path: benchmarks
          pattern: benchmark-results-*

      - name: Analyze Results
        run: |
          echo "=== Performance Regression Analysis ==="

          # Check for significant regressions (>10%)
          REGRESSION_FOUND=false

          for result in benchmarks/*/benchmark-results.json; do
            if [ -f "$result" ]; then
              echo "Analyzing: $result"
              # Add regression detection logic
            fi
          done

          if [ "$REGRESSION_FOUND" = true ]; then
            echo "⚠️ Performance regression detected!"
            exit 1
          fi

      - name: Upload Analysis
        uses: actions/upload-artifact@v7
        with:
          name: regression-analysis
          path: regression-report.md

  # ============================================================================
  # Store Benchmark History
  # ============================================================================
  store-history:
    name: Store Benchmark History
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download All Benchmark Results
        uses: actions/download-artifact@v8
        with:
          path: benchmarks
          pattern: benchmark-results-*

      - name: Update History
        run: |
          mkdir -p gh-pages/benchmarks

          # Copy new results
          for dir in benchmarks/*/; do
            os=$(basename "$dir" | sed 's/benchmark-results-//')
            mkdir -p "gh-pages/benchmarks/$os"
            cp "$dir"/* "gh-pages/benchmarks/$os/"
          done

          # Update index
          cat > gh-pages/benchmarks/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>EasySSH Benchmarks</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
              table { width: 100%; border-collapse: collapse; }
              th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
              th { background: #f5f5f5; }
            </style>
          </head>
          <body>
            <h1>EasySSH Performance Benchmarks</h1>
            <p>Last updated: $(date -u)</p>
            <table>
              <tr><th>Platform</th><th>Latest Results</th><th>History</th></tr>
          EOF

          for os in ubuntu-latest windows-latest macos-latest; do
            if [ -d "gh-pages/benchmarks/$os" ]; then
              echo "<tr><td>$os</td><td><a href='$os/benchmark-results.json'>Latest</a></td><td><a href='$os/'>History</a></td></tr>" >> gh-pages/benchmarks/index.html
            fi
          done

          cat >> gh-pages/benchmarks/index.html << 'EOF'
            </table>
          </body>
          </html>
          EOF

      - name: Commit and Push
        run: |
          cd gh-pages
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add benchmarks/
            git commit -m "Update benchmark results for ${{ github.sha }}"
            git push
          fi
