[package]
name = "easyssh-winui"
version = "0.3.0"
edition = "2021"
authors = ["EasySSH Team"]
description = "EasySSH WinUI 3 native client for Windows"
license = "MIT"

[[bin]]
name = "EasySSH"
path = "src/main.rs"

[dependencies]
easyssh-core = { path = "../../../core" }

# Windows bindings (simplified for now - using core directly)
# Full WinUI 3 integration requires windows-app-sdk crate

# Async
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[build-dependencies]
windows = "0.52"

[profile.release]
panic = "abort"
lto = true
opt-level = 3
strip = true

# Standalone workspace (not part of main workspace)
[workspace]
