name: CI (Babysitter)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # BabySitter: Watch for issues and regressions
  babysitter:
    name: Code Quality Watchdog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Babysitter checks
        run: |
          echo "=== BabySitter Code Quality Check ==="
          echo "Checking for code smells..."
          # Placeholder for babysitter integration
          echo "Babysitter is watching your code quality"

  # TypeScript type check
  types:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # Rust check
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rustfmt
        run: rustfmt --check src-tauri/src/**/*.rs

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  # Build
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Rust setup
        if: matrix.os != 'ubuntu-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # BabySitter End-to-End Test
  e2e-test:
    name: E2E Test (Babysitter)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: |
          echo "=== BabySitter E2E Test ==="
          # Placeholder for Playwright E2E tests
          echo "E2E tests would run here"
