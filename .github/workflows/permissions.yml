# Allow all permissions for comprehensive CI/CD
# This workflow uses strict security practices

name: permissions

on:
  workflow_call:

permissions:
  actions: read          # Read workflow information
  checks: write          # Write check results
  contents: write        # Create releases, commit changes
  deployments: write     # Create deployments
  id-token: write        # OIDC token for cloud providers
  issues: write          # Create issue comments
  packages: write        # Push to container registry
  pages: write           # Deploy to GitHub Pages
  pull-requests: write   # Comment on PRs
  security-events: write # Upload security scan results
  statuses: write        # Update commit status
