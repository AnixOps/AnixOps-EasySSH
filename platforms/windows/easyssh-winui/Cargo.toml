[package]
name = "easyssh-winui"
version = "0.3.0"
edition = "2021"
authors = ["EasySSH Team"]
description = "EasySSH WinUI 3 native client for Windows"
license = "MIT"

[[bin]]
name = "EasySSH"
path = "src/main.rs"

[dependencies]
easyssh-core = { path = "../../../core" }

# Windows bindings
windows = { version = "0.52", features = [
    "UI_Core",
    "UI_Xaml",
    "UI_Xaml_Controls",
    "UI_Xaml_Input",
    "UI_Xaml_Media",
    "UI_Xaml_Navigation",
    "UI_Xaml_Data",
    "UI_Xaml_Hosting",
    "ApplicationModel_Activation",
    "Foundation_Collections",
    "Foundation_Numerics",
    "Graphics",
    "System",
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_Com",
    "Win32_UI_Shell",
    "implement",
]}

windows-core = "0.52"

# Async
tokio = { version = "1", features = ["full"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[build-dependencies]
windows = "0.52"

[profile.release]
panic = "abort"
lto = true
opt-level = 3
strip = true
