site_name: EasySSH Documentation
repo_name: anixops/easyssh
repo_url: https://github.com/anixops/easyssh

nav:
  - Home: index.md
  - Guide:
    - Quick Start: guide/index.md
    - Installation: guide/installation.md
    - Editions: guide/editions.md
    - Features:
      - Lite: guide/features/lite.md
      - Standard: guide/features/standard.md
      - Pro: guide/features/pro.md
    - Shortcuts: guide/shortcuts.md
  - API:
    - Overview: api/index.md
    - Core:
      - SSH: api/core/ssh.md
      - Database: api/core/db.md
      - Crypto: api/core/crypto.md
      - SFTP: api/core/sftp.md
    - FFI: api/ffi.md
  - Develop:
    - Getting Started: develop/index.md
    - Architecture: develop/architecture.md
    - Contributing: develop/contributing.md
  - Deploy:
    - Overview: deploy/index.md
    - Enterprise: deploy/enterprise.md
  - FAQ: faq/index.md
  - Troubleshooting: troubleshooting/index.md
  - Releases:
    - Overview: releases/index.md
    - Changelog: releases/changelog.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anixops/easyssh
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/easyssh

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
