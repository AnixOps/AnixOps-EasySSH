name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/*', 'hotfix/*']
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'assets/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'standard'
        type: choice
        options:
          - standard
          - canary
          - full
      target_platform:
        description: 'Target Platform'
        required: false
        type: choice
        options:
          - all
          - windows
          - linux
          - macos
      enable_signing:
        description: 'Enable Code Signing'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 1
  RUST_BACKTRACE: 1
  NODE_VERSION: '22'
  RUST_VERSION: 'stable'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # PHASE 1: CHANGE DETECTION (Incremental Builds)
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      tui: ${{ steps.filter.outputs.tui }}
      windows: ${{ steps.filter.outputs.windows }}
      linux: ${{ steps.filter.outputs.linux }}
      macos: ${{ steps.filter.outputs.macos }}
      web: ${{ steps.filter.outputs.web }}
      ci: ${{ steps.filter.outputs.ci }}
      should_build_all: ${{ steps.decide.outputs.should_build_all }}
      version: ${{ steps.version.outputs.version }}
      release_channel: ${{ steps.version.outputs.release_channel }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect File Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'core/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            tui:
              - 'tui/**'
              - 'core/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            windows:
              - 'platforms/windows/**'
              - 'core/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            linux:
              - 'platforms/linux/**'
              - 'core/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            macos:
              - 'platforms/macos/**'
              - 'core/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            web:
              - 'apps/**'
              - 'packages/**'
              - 'package*.json'
            ci:
              - '.github/workflows/**'

      - name: Determine Build Scope
        id: decide
        run: |
          # Build all if on main branch, tags, or CI changes
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || \
             [[ "${{ github.ref }}" == refs/heads/main ]] || \
             [[ "${{ steps.filter.outputs.ci }}" == "true" ]] || \
             [[ "${{ github.event.inputs.build_type }}" == "full" ]]; then
            echo "should_build_all=true" >> $GITHUB_OUTPUT
          else
            echo "should_build_all=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "release_channel=stable" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            VERSION=$(echo ${GITHUB_REF#refs/heads/release/})-rc.${{ github.run_number }}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "release_channel=rc" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.build_type }}" == "canary" ]]; then
            VERSION=$(cat Cargo.toml | grep "^version" | head -1 | cut -d'"' -f2)-canary.${{ github.run_number }}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "release_channel=canary" >> $GITHUB_OUTPUT
          else
            VERSION=$(cat Cargo.toml | grep "^version" | head -1 | cut -d'"' -f2)-dev.${{ github.run_number }}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "release_channel=dev" >> $GITHUB_OUTPUT
          fi
          echo "Building version: $VERSION"
          echo "Release channel: ${{ steps.version.outputs.release_channel }}"

  # ============================================================================
  # PHASE 2: SECURITY & QUALITY GATES
  # ============================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.core == 'true' || needs.changes.outputs.should_build_all == 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Cargo Audit
        run: cargo install cargo-audit --locked

      - name: Run Security Audit
        run: cargo audit --json > audit-results.json || true

      - name: Upload Audit Results
        uses: actions/upload-artifact@v7
        with:
          name: security-audit
          path: audit-results.json

      - name: Check for Critical Vulnerabilities
        run: |
          if [ -f audit-results.json ]; then
            CRITICAL=$(cat audit-results.json | jq '.vulnerabilities.critical // 0')
            HIGH=$(cat audit-results.json | jq '.vulnerabilities.high // 0')
            if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
              echo "⚠️ Found $CRITICAL critical and $HIGH high severity vulnerabilities"
              # Don't fail the build, but alert
            fi
          fi

  cargo-deny:
    name: License & Supply Chain Check
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.core == 'true' || needs.changes.outputs.should_build_all == 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Run Cargo Deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check all
          arguments: --all-features

  # ============================================================================
  # PHASE 3: MATRIX BUILD (Multiple Rust/Node Versions)
  # ============================================================================
  build-matrix:
    name: Build Matrix Test
    runs-on: ${{ matrix.os }}
    needs: changes
    if: ${{ needs.changes.outputs.core == 'true' || needs.changes.outputs.should_build_all == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]
        exclude:
          # Only run beta on one platform to save time
          - os: windows-latest
            rust: beta
          - os: macos-latest
            rust: beta

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy, llvm-tools-preview

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}-${{ matrix.rust }}
          cache-on-failure: true
          workspaces: |
            .
            core
            tui
            platforms/windows/easyssh-winui
            platforms/linux/easyssh-gtk4

      - name: Build (Release)
        run: cargo build --release -p easyssh-core

      - name: Run Tests
        run: cargo test --release -p easyssh-core

      - name: Generate Coverage
        if: matrix.rust == 'stable'
        run: |
          cargo install cargo-tarpaulin || true
          cargo tarpaulin --out Xml -p easyssh-core || true

      - name: Upload Coverage
        if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          fail_ci_if_error: false

  # ============================================================================
  # PHASE 4: PLATFORM BUILDS (Parallel)
  # ============================================================================

  # Windows Build with Code Signing
  build-windows:
    name: Windows Native Build
    runs-on: windows-latest
    needs: [changes, security-audit, cargo-deny]
    if: ${{ (needs.changes.outputs.windows == 'true' || needs.changes.outputs.should_build_all == 'true') && (github.event.inputs.target_platform == 'all' || github.event.inputs.target_platform == 'windows' || github.event.inputs.target_platform == '') }}
    env:
      SIGN_ENABLED: ${{ secrets.WINDOWS_CERTIFICATE != '' || github.event.inputs.enable_signing == 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-native
          workspaces: |
            .
            platforms/windows/easyssh-winui

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Release Binary
        working-directory: platforms/windows/easyssh-winui
        run: cargo build --release

      - name: Run Tests
        working-directory: platforms/windows/easyssh-winui
        run: cargo test --release

      - name: Setup Signing Certificate
        if: env.SIGN_ENABLED == 'true'
        run: |
          $certBytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE }}")
          [IO.File]::WriteAllBytes("certificate.pfx", $certBytes)

      - name: Sign Binary
        if: env.SIGN_ENABLED == 'true'
        run: |
          $signTool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22000.0\x64\signtool.exe"
          if (-not (Test-Path $signTool)) {
            $signTool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | Select-Object -First 1).FullName
          }
          & $signTool sign /f certificate.pfx /p "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 /a "platforms\windows\easyssh-winui\target\release\EasySSH.exe"

      - name: Package MSI/Installer
        run: |
          # Create MSI package (if WiX is configured)
          echo "Creating Windows installer..."
          mkdir -p dist/windows
          cp platforms/windows/easyssh-winui/target/release/EasySSH.exe dist/windows/
          # Add installer creation logic here

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-native
          path: |
            platforms/windows/easyssh-winui/target/release/EasySSH.exe
            dist/windows/
          retention-days: 30

  # Linux Build
  build-linux:
    name: Linux Native Build
    runs-on: ubuntu-latest
    needs: [changes, security-audit, cargo-deny]
    if: ${{ (needs.changes.outputs.linux == 'true' || needs.changes.outputs.should_build_all == 'true') && (github.event.inputs.target_platform == 'all' || github.event.inputs.target_platform == 'linux' || github.event.inputs.target_platform == '') }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            cross: true

    steps:
      - uses: actions/checkout@v6

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config \
            xvfb \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-native-${{ matrix.arch }}
          workspaces: |
            .
            platforms/linux/easyssh-gtk4

      - name: Build (Native)
        if: '!matrix.cross'
        working-directory: platforms/linux/easyssh-gtk4
        run: cargo build --release

      - name: Build (Cross)
        if: matrix.cross
        working-directory: platforms/linux/easyssh-gtk4
        run: cross build --release --target ${{ matrix.target }}

      - name: Run Tests (Headless)
        if: '!matrix.cross'
        working-directory: platforms/linux/easyssh-gtk4
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 3
          cargo test --release

      - name: Create AppImage
        run: |
          # Create AppImage package
          mkdir -p dist/linux/${{ matrix.arch }}
          cp platforms/linux/easyssh-gtk4/target/release/easyssh dist/linux/${{ matrix.arch }}/ || \
          cp platforms/linux/easyssh-gtk4/target/${{ matrix.target }}/release/easyssh dist/linux/${{ matrix.arch }}/
          # Add AppImage creation logic here

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-native-${{ matrix.arch }}
          path: |
            platforms/linux/easyssh-gtk4/target/**/release/easyssh
            dist/linux/
          retention-days: 30

  # macOS Build with Notarization
  build-macos:
    name: macOS Native Build
    runs-on: macos-latest
    needs: [changes, security-audit, cargo-deny]
    if: ${{ (needs.changes.outputs.macos == 'true' || needs.changes.outputs.should_build_all == 'true') && (github.event.inputs.target_platform == 'all' || github.event.inputs.target_platform == 'macos' || github.event.inputs.target_platform == '') }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-native-${{ matrix.target }}

      - name: Build Core Library
        run: |
          cd core
          cargo build --release --target ${{ matrix.target }}

      - name: Build Swift Package
        working-directory: platforms/macos/EasySSH
        run: |
          swift build -c release --arch $(echo ${{ matrix.target }} | sed 's/-apple-darwin//')

      - name: Create App Bundle
        working-directory: platforms/macos/EasySSH
        run: |
          # Build full app bundle
          swift build -c release
          # Add app bundle creation logic

      - name: Sign and Notarize
        if: ${{ secrets.MACOS_CERTIFICATE != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Code sign
          # Notarize
          echo "Signing and notarizing macOS app..."

      - name: Package DMG
        run: |
          mkdir -p dist/macos
          # Create DMG
          echo "Creating macOS DMG..."

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-native-${{ matrix.target }}
          path: |
            platforms/macos/EasySSH/.build/release/
            dist/macos/
          retention-days: 30

  # Core Library Build
  build-core:
    name: Core Library Build
    runs-on: ${{ matrix.os }}
    needs: [changes, security-audit, cargo-deny]
    if: ${{ needs.changes.outputs.core == 'true' || needs.changes.outputs.should_build_all == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: core-${{ matrix.os }}
          workspaces: core

      - name: Build Library
        run: cargo build --release -p easyssh-core

      - name: Generate Documentation
        run: cargo doc --no-deps -p easyssh-core

      - name: Run Tests
        run: cargo test --release -p easyssh-core

      - name: Run Clippy
        run: cargo clippy -p easyssh-core -- -D warnings

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: core-${{ matrix.os }}
          path: |
            target/release/*easyssh_core*
            target/doc/
          retention-days: 30

  # TUI CLI Build
  build-tui:
    name: TUI CLI Build
    runs-on: ${{ matrix.os }}
    needs: [changes, security-audit, cargo-deny]
    if: ${{ needs.changes.outputs.tui == 'true' || needs.changes.outputs.should_build_all == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tui-${{ matrix.os }}
          workspaces: |
            core
            tui

      - name: Build TUI
        run: cargo build --release -p easyssh-tui

      - name: Run Tests
        run: cargo test --release -p easyssh-tui

      - name: Create Archive
        shell: bash
        run: |
          mkdir -p dist/tui
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/release/easyssh.exe dist/tui/easyssh-${{ matrix.os }}.exe
          else
            tar -czf dist/tui/easyssh-${{ matrix.os }}.tar.gz -C target/release easyssh
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tui-${{ matrix.os }}
          path: dist/tui/
          retention-days: 30

  # ============================================================================
  # PHASE 5: PERFORMANCE BENCHMARKS
  # ============================================================================
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: build-core
    if: ${{ needs.changes.outputs.core == 'true' || needs.changes.outputs.should_build_all == 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: benchmarks

      - name: Download Previous Benchmark
        uses: actions/download-artifact@v8
        with:
          name: benchmark-results
          path: previous-benchmark
        continue-on-on-error: true

      - name: Run Benchmarks
        run: |
          cargo bench -p easyssh-core -- --output-format bencher > benchmark-results.txt || true
          cat benchmark-results.txt

      - name: Compare with Previous
        run: |
          if [ -f previous-benchmark/benchmark-results.txt ]; then
            echo "=== Performance Comparison ==="
            # Add comparison logic
          fi

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 90

      - name: Create Benchmark Dashboard
        run: |
          echo "## Performance Benchmarks" > benchmark-dashboard.md
          echo "\`\`\`" >> benchmark-dashboard.md
          cat benchmark-results.txt >> benchmark-dashboard.md
          echo "\`\`\`" >> benchmark-dashboard.md

  # ============================================================================
  # PHASE 6: RELEASE MANAGEMENT
  # ============================================================================
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    needs: [changes, build-windows, build-linux, build-macos, build-core, build-tui]
    if: ${{ needs.changes.outputs.release_channel != 'dev' || github.event.inputs.build_type == 'canary' }}

    steps:
      - uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Organize Artifacts
        run: |
          mkdir -p release
          VERSION="${{ needs.changes.outputs.version }}"
          CHANNEL="${{ needs.changes.outputs.release_channel }}"

          # Organize by platform
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            echo "Processing $name..."
            mkdir -p "release/$name"
            cp -r "$dir"/* "release/$name/" 2>/dev/null || true
          done

          # Create release notes template
          cat > release/RELEASE_NOTES.md << EOF
          # EasySSH v$VERSION

          **Channel:** $CHANNEL
          **Date:** $(date -u +"%Y-%m-%d %H:%M UTC")

          ## Downloads

          ### Windows
          - [EasySSH-Windows-x64.exe](EasySSH-$VERSION-windows-x64.exe)
          - [EasySSH-Windows-x64.msi](EasySSH-$VERSION-windows-x64.msi)

          ### Linux
          - [EasySSH-Linux-x64.AppImage](EasySSH-$VERSION-linux-x64.AppImage)
          - [EasySSH-Linux-arm64.AppImage](EasySSH-$VERSION-linux-arm64.AppImage)
          - [easyssh-tui-linux.tar.gz](easyssh-tui-$VERSION-linux.tar.gz)

          ### macOS
          - [EasySSH-macOS-x64.dmg](EasySSH-$VERSION-macos-x64.dmg)
          - [EasySSH-macOS-arm64.dmg](EasySSH-$VERSION-macos-arm64.dmg)

          ### CLI
          - [easyssh-tui-windows.exe](easyssh-tui-$VERSION-windows.exe)
          - [easyssh-tui-macos.tar.gz](easyssh-tui-$VERSION-macos.tar.gz)

          ## Checksums
          \`\`\`
          EOF

          # Generate checksums
          find release -type f -exec sha256sum {} \; >> release/RELEASE_NOTES.md
          echo "\`\`\`" >> release/RELEASE_NOTES.md

          echo "Release prepared: v$VERSION ($CHANNEL)"

      - name: Upload Release Package
        uses: actions/upload-artifact@v7
        with:
          name: release-package
          path: release/
          retention-days: 30

  # ============================================================================
  # PHASE 7: CANARY RELEASE
  # ============================================================================
  canary-release:
    name: Canary Release
    runs-on: ubuntu-latest
    needs: prepare-release
    if: ${{ github.event.inputs.build_type == 'canary' || needs.changes.outputs.release_channel == 'canary' }}
    environment: canary

    steps:
      - uses: actions/checkout@v6

      - name: Download Release Package
        uses: actions/download-artifact@v8
        with:
          name: release-package
          path: release

      - name: Deploy to Canary Server
        env:
          CANARY_API_KEY: ${{ secrets.CANARY_API_KEY }}
          CANARY_ENDPOINT: ${{ secrets.CANARY_ENDPOINT }}
        run: |
          echo "Deploying canary release..."
          VERSION="${{ needs.changes.outputs.version }}"

          # Upload to canary distribution server
          # curl -X POST "$CANARY_ENDPOINT" \
          #   -H "Authorization: Bearer $CANARY_API_KEY" \
          #   -F "version=$VERSION" \
          #   -F "channel=canary" \
          #   -F "artifacts=@release/"

          echo "Canary release v$VERSION deployed"

      - name: Update Canary Channel
        run: |
          # Update canary channel manifest
          echo "Updating canary channel manifest..."

  # ============================================================================
  # PHASE 8: PRODUCTION RELEASE
  # ============================================================================
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: prepare-release
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_type == 'full' }}
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Download Release Package
        uses: actions/download-artifact@v8
        with:
          name: release-package
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.changes.outputs.version }}
          name: EasySSH v${{ needs.changes.outputs.version }}
          body_path: release/RELEASE_NOTES.md
          files: release/**/*
          draft: ${{ needs.changes.outputs.release_channel != 'stable' }}
          prerelease: ${{ needs.changes.outputs.release_channel != 'stable' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # PHASE 9: AUTO UPDATE
  # ============================================================================
  update-updater:
    name: Update Auto-Updater
    runs-on: ubuntu-latest
    needs: github-release
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - uses: actions/checkout@v6

      - name: Generate Update Manifest
        run: |
          VERSION="${{ needs.changes.outputs.version }}"
          cat > update-manifest.json << EOF
          {
            "version": "$VERSION",
            "release_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "channels": {
              "stable": {
                "version": "$VERSION",
                "mandatory": false,
                "url": "https://github.com/anixops/easyssh/releases/download/v$VERSION/"
              }
            },
            "platforms": {
              "windows-x64": {
                "signature": "",
                "url": "EasySSH-$VERSION-windows-x64.exe"
              },
              "linux-x64": {
                "signature": "",
                "url": "EasySSH-$VERSION-linux-x64.AppImage"
              },
              "macos-x64": {
                "signature": "",
                "url": "EasySSH-$VERSION-macos-x64.dmg"
              },
              "macos-arm64": {
                "signature": "",
                "url": "EasySSH-$VERSION-macos-arm64.dmg"
              }
            }
          }
          EOF

          cat update-manifest.json

      - name: Upload Update Manifest
        uses: actions/upload-artifact@v7
        with:
          name: update-manifest
          path: update-manifest.json

      - name: Deploy to CDN
        if: ${{ secrets.CDN_API_KEY != '' }}
        env:
          CDN_API_KEY: ${{ secrets.CDN_API_KEY }}
        run: |
          echo "Deploying update manifest to CDN..."
          # curl -X POST ... update-manifest.json

  # ============================================================================
  # PHASE 10: MONITORING & ROLLBACK
  # ============================================================================
  post-release-monitor:
    name: Post-Release Monitoring
    runs-on: ubuntu-latest
    needs: github-release
    if: ${{ always() && needs.github-release.result == 'success' }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Monitoring
        run: |
          VERSION="${{ needs.changes.outputs.version }}"
          echo "Setting up monitoring for release v$VERSION..."

      - name: Create Rollback Tag
        run: |
          VERSION="${{ needs.changes.outputs.version }}"
          git tag -a "rollback-$VERSION" -m "Rollback point for v$VERSION"
          # Don't push the tag yet - only if rollback is needed

      - name: Wait for Health Checks
        run: |
          echo "Waiting for health checks..."
          sleep 60
          # Add health check polling logic

      - name: Report Release Status
        run: |
          echo "Release monitoring complete"

  # Rollback Job (Manual Trigger)
  rollback:
    name: Rollback Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'rollback' }}
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Rollback to Previous Version
        run: |
          echo "Rolling back release..."
          # Implement rollback logic
          # - Delete GitHub release
          # - Restore previous update manifest
          # - Notify users

      - name: Notify Rollback
        uses: slackapi/slack-github-action@v1
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        with:
          payload: |
            {
              "text": "🚨 Release rollback initiated for ${{ needs.changes.outputs.version }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================================================
  # PHASE 11: NOTIFICATIONS
  # ============================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [github-release, canary-release]
    if: ${{ always() }}

    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "EasySSH Build Complete"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n${{ needs.changes.outputs.version }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Channel:*\n${{ needs.changes.outputs.release_channel }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ needs.github-release.result == 'success' && '✅ Success' || '❌ Failed' }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Create Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.changes.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Channel:** ${{ needs.changes.outputs.release_channel }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
