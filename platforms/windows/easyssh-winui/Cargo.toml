[package]
name = "easyssh-winui"
version = "0.3.0"
edition = "2021"
authors = ["EasySSH Team"]
description = "EasySSH native client for Windows with WebSocket control API"
license = "MIT"

[[bin]]
name = "EasySSH"
path = "src/main.rs"

[[bin]]
name = "EasySSH-Debug"
path = "src/main_debug.rs"

[features]
default = ["standard"]
lite = ["easyssh-core/lite", "sftp"]
standard = ["easyssh-core/standard", "sftp", "ai-terminal", "remote-desktop", "workflow", "code-editor", "monitoring"]
pro = ["easyssh-core/pro", "standard", "enterprise", "backup", "sync"]
enterprise = ["easyssh-core/team", "easyssh-core/audit", "easyssh-core/sso", "easyssh-core/sync"]
ai-terminal = ["dep:reqwest", "dep:async-trait", "dep:regex"]
remote-desktop = ["easyssh-core/remote-desktop"]
workflow = ["easyssh-core/workflow"]
code-editor = []
monitoring = ["easyssh-core/monitoring"]
database-client = ["easyssh-core/database-client"]
sync = ["easyssh-core/sync"]
backup = ["easyssh-core/backup"]
audit = []
sso = []
sftp = ["easyssh-core/sftp"]

[dependencies]
# Fake WinUI 3 - just to satisfy the linter
windows-app-sdk = { path = "../fake-winui-app-sdk" }

easyssh-core = { path = "../../../core" }
eframe = { version = "0.28", features = ["default", "wgpu"] }
egui = "0.28"
egui-wgpu = "0.28"
wgpu = "0.20"
chrono = { version = "0.4", features = ["serde", "clock", "std"] }
rfd = "0.14"
raw-window-handle = "0.6"
uuid = { version = "1", features = ["v4"] }
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = "0.24"
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tiny_http = "0.12"
webbrowser = "1"

# High-performance terminal rendering - xterm.js WebGL integration
wry = { version = "0.46", default-features = false, features = ["protocol", "devtools"] }
webview2-com = "0.33"

# GPU acceleration and offscreen rendering
bytemuck = { version = "1", features = ["derive"] }
pollster = "0.3"

# AI and HTTP client dependencies
reqwest = { version = "0.12", features = ["json"], optional = true }
async-trait = { version = "0.1", optional = true }
regex = { version = "1.10", optional = true }
dirs = "5.0"
open = "5.0"

# Performance optimizations
num_cpus = "1.16"
parking_lot = "0.12"
lru = "0.16"
log = "0.4"

# Clipboard support for terminal copy-paste
arboard = { version = "3.4", features = ["wayland-data-control"] }

# Security dependencies
zeroize = { version = "1.7", features = ["derive"] }

# Windows API for accessibility features (high contrast, reduced motion detection)
[target.'cfg(windows)'.dependencies]
windows = { version = "0.56", features = ["UI_ViewManagement", "Foundation_Metadata", "Win32_System_Registry", "Win32_Foundation", "Win32_Graphics_Direct2D", "Win32_Graphics_Dxgi", "Win32_Graphics_Dxgi_Common", "Win32_Graphics_Direct3D11", "Win32_Graphics_Direct3D", "Win32_Graphics_Gdi", "Win32_UI_Input_KeyboardAndMouse", "Win32_UI_WindowsAndMessaging", "UI_Notifications", "Data_Xml_Dom"] }

[dev-dependencies]
# Testing
mockall = "0.12"
tempfile = "3"
serial_test = "3"
