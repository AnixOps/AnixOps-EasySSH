name: Cross-Platform Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==================== Unit Tests ====================
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Core Unit Tests
        run: cargo test -p easyssh-core --lib

      - name: Run TUI Unit Tests
        run: cargo test -p easyssh-tui --lib 2>/dev/null || echo "No TUI unit tests"

  # ==================== Windows egui Tests ====================
  windows-tests:
    name: Windows egui Tests
    runs-on: windows-latest
    defaults:
      run:
        working-directory: platforms/windows/easyssh-winui

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Model Tests
        run: cargo test --test ui_tests

      - name: Run Unit Tests
        run: cargo test --lib

      - name: Run Integration Tests
        run: cargo test --all-features 2>/dev/null || echo "No additional tests"

      - name: Generate Test Report
        run: |
          cargo test --lib -- --format=json > test-results.json 2>/dev/null || true
        continue-on-error: true

  # ==================== Linux GTK4 Tests ====================
  linux-tests:
    name: Linux GTK4 Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platforms/linux/easyssh-gtk4

    steps:
      - uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config \
            xvfb \
            dbus-x11

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Model Tests (Headless)
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 3
          cargo test --lib

      - name: Run Integration Tests (Headless)
        run: |
          export DISPLAY=:99
          dbus-run-session -- cargo test --test integration_tests
        continue-on-error: true

      - name: Run All Tests
        run: |
          export DISPLAY=:99
          cargo test --all-features
        continue-on-error: true

  # ==================== macOS SwiftUI Tests ====================
  macos-tests:
    name: macOS SwiftUI Tests
    runs-on: macos-latest
    defaults:
      run:
        working-directory: platforms/macos/EasySSH

    steps:
      - uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Core
        run: |
          cd ../../core
          cargo build --release
          mkdir -p target/include

      - name: Run Swift Tests
        run: swift test

      - name: Run Tests with Coverage
        run: |
          swift test --enable-code-coverage 2>/dev/null || swift test

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        with:
          name: macos-test-results
          path: |
            platforms/macos/EasySSH/.build/debug/*Tests*
          if-no-files-found: warn
        continue-on-error: true

  # ==================== Integration Tests ====================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Core Integration Tests
        run: cargo test -p easyssh-core --test '*' 2>/dev/null || cargo test -p easyssh-core

      - name: Test All Packages
        run: |
          cargo test --workspace 2>/dev/null || echo "Testing individual packages..."
          cargo test -p easyssh-core
          cargo test -p easyssh-tui 2>/dev/null || true

  # ==================== Code Coverage ====================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config

      - name: Generate Coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info 2>/dev/null || echo "Coverage generation skipped"
        continue-on-error: true

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  # ==================== Test Report ====================
  test-report:
    name: Test Report
    needs: [unit-tests, windows-tests, linux-tests, macos-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v6

      - name: Download All Test Results
        uses: actions/download-artifact@v8
        with:
          path: test-results
        continue-on-error: true

      - name: Generate Test Summary
        run: |
          echo "# Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.unit-tests.result }}" == "success" ]; then
            echo "| Core Unit Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Core Unit Tests | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.windows-tests.result }}" == "success" ]; then
            echo "| Windows egui | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Windows egui | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.linux-tests.result }}" == "success" ]; then
            echo "| Linux GTK4 | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Linux GTK4 | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.macos-tests.result }}" == "success" ]; then
            echo "| macOS SwiftUI | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| macOS SwiftUI | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi
