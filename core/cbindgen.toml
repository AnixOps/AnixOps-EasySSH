language = "C"
header = "/* EasySSH Core FFI - Auto-generated by cbindgen */"
include_guard = "EASYSSH_CORE_H"
autogen_warning = "/* Warning: this file is auto-generated. Do not modify. */"
namespace = "easyssh"

# Export configuration
[export]
include = ["ffi"]
prefix = "easyssh_"

# Parse configuration
[parse]
parse_deps = false

# Function configuration
[fn]
args = "horizontal"
sort_by = "Name"

# Struct configuration
[struct]
rename_fields = "SnakeCase"

# Enum configuration
[enum]
rename_variants = "ScreamingSnakeCase"

# Macro configuration
[defines]
"feature = lite" = "EASYSSH_LITE"
"feature = standard" = "EASYSSH_STANDARD"
"feature = pro" = "EASYSSH_PRO"
