name: CI

on:
  push:
    branches: [main, develop, 'feature/*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/**'
  merge_group:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Changed Files Detection
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.changes.outputs.rust }}
      typescript: ${{ steps.changes.outputs.typescript }}
      swift: ${{ steps.changes.outputs.swift }}
      windows: ${{ steps.changes.outputs.windows }}
      linux: ${{ steps.changes.outputs.linux }}
      macos: ${{ steps.changes.outputs.macos }}
      docker: ${{ steps.changes.outputs.docker }}
      pro-server: ${{ steps.changes.outputs.pro-server }}

    steps:
      - uses: actions/checkout@v4

      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'deny.toml'
            typescript:
              - '**/*.ts'
              - '**/*.tsx'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
            swift:
              - 'platforms/macos/**/*.swift'
              - 'platforms/macos/**/Package.swift'
            windows:
              - 'crates/easyssh-platforms/windows/**/*.rs'
              - 'crates/easyssh-platforms/windows/**/Cargo.toml'
            linux:
              - 'crates/easyssh-platforms/linux/**/*.rs'
              - 'crates/easyssh-platforms/linux/**/Cargo.toml'
            macos:
              - 'platforms/macos/**/*.swift'
              - 'platforms/macos/**/*.rs'
            docker:
              - 'docker/**'
              - '**/Dockerfile'
            pro-server:
              - 'crates/easyssh-pro-server/**/*.rs'
              - 'crates/easyssh-pro-server/**/Cargo.toml'

  # ============================================================================
  # Rust Code Quality (fmt, clippy, audit)
  # ============================================================================
  rust-quality:
    name: Rust Code Quality
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [lite, standard, pro]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit,cargo-outdated

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "easyssh-quality-${{ matrix.version }}"
          workspaces: ". -> target"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config libssl-dev

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Clippy (${{ matrix.version }})
        run: |
          cargo clippy -p easyssh-core --features ${{ matrix.version }} --all-targets -- \
            -D warnings \
            -A clippy::type_complexity \
            -A clippy::too_many_arguments

      - name: Check dependencies
        run: |
          echo "### Dependency Checks (${{ matrix.version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cargo deny check licenses 2>&1 | head -50 || true

  # ============================================================================
  # TypeScript Code Quality
  # ============================================================================
  typescript-quality:
    name: TypeScript Code Quality
    needs: changes
    if: ${{ needs.changes.outputs.typescript == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd tests && npm ci

      - name: Type check
        run: |
          cd tests
          npx tsc --noEmit

      - name: Run ESLint
        run: |
          cd tests
          npm run lint 2>/dev/null || true
        continue-on-error: true

      - name: Check formatting
        run: |
          cd tests
          npx prettier --check "**/*.{ts,tsx,js,jsx}" 2>/dev/null || true
        continue-on-error: true

  # ============================================================================
  # Swift Code Quality (macOS)
  # ============================================================================
  swift-quality:
    name: Swift Code Quality
    needs: changes
    if: ${{ needs.changes.outputs.swift == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Core (all versions)
        working-directory: crates/easyssh-core
        run: |
          cargo build --features lite --release
          cargo build --features standard --release
          cargo build --features pro --release

      - name: Swift Format Check
        working-directory: platforms/macos/EasySSH
        run: |
          swift package resolve
          swift-format lint --recursive Sources/ 2>/dev/null || true
        continue-on-error: true

      - name: Swift Build
        working-directory: platforms/macos/EasySSH
        run: swift build

  # ============================================================================
  # Core Library Tests (三版本)
  # ============================================================================
  core-tests:
    name: Core Tests (${{ matrix.version }})
    needs: [changes, rust-quality]
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        version: [lite, standard, pro]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "easyssh-core-${{ matrix.version }}"

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Run tests (${{ matrix.version }})
        working-directory: crates/easyssh-core
        run: |
          cargo test --features ${{ matrix.version }} -- --test-threads=2

      - name: Run tests with coverage (Ubuntu only)
        if: matrix.os == 'ubuntu-latest' && matrix.version == 'lite'
        working-directory: crates/easyssh-core
        run: |
          cargo llvm-cov --features ${{ matrix.version }} --lcov --output-path ../../lcov-${{ matrix.version }}.info

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.version == 'lite'
        uses: codecov/codecov-action@v4
        with:
          files: lcov-${{ matrix.version }}.info
          flags: ${{ matrix.version }}
          name: ${{ matrix.version }}-coverage
          fail_ci_if_error: false
        continue-on-error: true

  # ============================================================================
  # Windows Build Check (三版本并行)
  # ============================================================================
  windows-build:
    name: Windows Build (${{ matrix.version }})
    needs: [changes, rust-quality]
    if: ${{ needs.changes.outputs.windows == 'true' || needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        version: [lite, standard, pro]
        include:
          - version: lite
            profile: release-lite
            features: lite
          - version: standard
            profile: release-standard
            features: standard
          - version: pro
            profile: release-pro
            features: pro

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "easyssh-windows-${{ matrix.version }}"

      - name: Build Windows ${{ matrix.version }}
        working-directory: crates/easyssh-platforms/windows/easyssh-winui
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cargo build --profile ${{ matrix.profile }} --features ${{ matrix.features }} --no-default-features

      - name: Test Windows ${{ matrix.version }}
        working-directory: crates/easyssh-platforms/windows/easyssh-winui
        run: cargo test --lib --features ${{ matrix.features }} --no-default-features

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: windows-${{ matrix.version }}-build-artifacts
          path: crates/easyssh-platforms/windows/easyssh-winui/target/
          retention-days: 3

  # ============================================================================
  # Linux Build Check (三版本并行)
  # ============================================================================
  linux-build:
    name: Linux Build (${{ matrix.version }})
    needs: [changes, rust-quality]
    if: ${{ needs.changes.outputs.linux == 'true' || needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [lite, standard, pro]
        include:
          - version: lite
            profile: release-lite
            features: easyssh-core/lite
          - version: standard
            profile: release-standard
            features: easyssh-core/standard
          - version: pro
            profile: release-pro
            features: easyssh-core/pro

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "easyssh-linux-${{ matrix.version }}"

      - name: Build Linux ${{ matrix.version }}
        working-directory: crates/easyssh-platforms/linux/easyssh-gtk4
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 3
          cargo build --profile ${{ matrix.profile }} --features ${{ matrix.features }} --no-default-features

      - name: Test Linux ${{ matrix.version }}
        working-directory: crates/easyssh-platforms/linux/easyssh-gtk4
        run: |
          export DISPLAY=:99
          cargo test --lib --features ${{ matrix.features }} --no-default-features

  # ============================================================================
  # macOS Build Check (三版本)
  # ============================================================================
  macos-build:
    name: macOS Build (${{ matrix.version }})
    needs: [changes, rust-quality, swift-quality]
    if: ${{ needs.changes.outputs.macos == 'true' || needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        version: [lite, standard, pro]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "easyssh-macos-${{ matrix.version }}"

      - name: Build Core (${{ matrix.version }})
        working-directory: crates/easyssh-core
        run: cargo build --features ${{ matrix.version }} --release

      - name: Build macOS SwiftUI
        working-directory: platforms/macos/EasySSH
        continue-on-error: true
        run: swift build

  # ============================================================================
  # Pro Server Build Check
  # ============================================================================
  pro-server-build:
    name: Pro Server Build
    needs: [changes, rust-quality]
    if: ${{ needs.changes.outputs.pro-server == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "easyssh-pro-server"

      - name: Build Pro Server
        working-directory: crates/easyssh-pro-server
        run: cargo build --release

      - name: Test Pro Server
        working-directory: crates/easyssh-pro-server
        run: cargo test --lib

  # ============================================================================
  # TUI Build Check (三版本)
  # ============================================================================
  tui-build:
    name: TUI Build (${{ matrix.version }})
    needs: [changes, rust-quality]
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        version: [lite, standard, pro]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-tui-${{ matrix.version }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev

      - name: Build TUI ${{ matrix.version }}
        working-directory: crates/easyssh-tui
        run: |
          cargo build --release --features ${{ matrix.version }} --no-default-features

      - name: Test TUI ${{ matrix.version }}
        working-directory: crates/easyssh-tui
        run: cargo test --lib --features ${{ matrix.version }} --no-default-features

  # ============================================================================
  # Docker Build Check (三版本)
  # ============================================================================
  docker-build:
    name: Docker Build (${{ matrix.variant }})
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' || needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [lite, standard, pro-server]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker ${{ matrix.variant }}
        run: |
          if [ -f "docker/${{ matrix.variant }}/Dockerfile" ]; then
            echo "Building ${{ matrix.variant }}..."
            docker build -f "docker/${{ matrix.variant }}/Dockerfile" -t "easyssh-${{ matrix.variant }}:ci" . || true
          else
            echo "No Dockerfile found for ${{ matrix.variant }}, skipping..."
          fi

  # ============================================================================
  # Security Audit
  # ============================================================================
  security-audit:
    name: Security Audit
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run security audit
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0388 --ignore RUSTSEC-2025-0057 --ignore RUSTSEC-2024-0384 --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2025-0134 --ignore RUSTSEC-2017-0008 --ignore RUSTSEC-2024-0429 --ignore RUSTSEC-2026-0002

  # ============================================================================
  # Documentation Check
  # ============================================================================
  docs-check:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust docs (all versions)
        run: |
          cargo doc -p easyssh-core --features lite --no-deps 2>&1 | tee doc-warnings-lite.txt || true
          cargo doc -p easyssh-core --features standard --no-deps 2>&1 | tee doc-warnings-std.txt || true
          cargo doc -p easyssh-core --features pro --no-deps 2>&1 | tee doc-warnings-pro.txt || true

      - name: Check dead links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --timeout 30 --max-retries 3 docs/ *.md
          fail: false

  # ============================================================================
  # CI Summary
  # ============================================================================
  ci-summary:
    name: CI Summary
    needs:
      - rust-quality
      - typescript-quality
      - swift-quality
      - core-tests
      - windows-build
      - linux-build
      - macos-build
      - pro-server-build
      - tui-build
      - docker-build
      - security-audit
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Code Quality" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.rust-quality.result }}" == "success" ]; then
            echo "| Rust Quality (all versions) | ✅ |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.rust-quality.result }}" == "skipped" ]; then
            echo "| Rust Quality | ⏭️ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Rust Quality | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.typescript-quality.result }}" == "success" ]; then
            echo "| TypeScript Quality | ✅ |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.typescript-quality.result }}" == "skipped" ]; then
            echo "| TypeScript Quality | ⏭️ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| TypeScript Quality | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.swift-quality.result }}" == "success" ]; then
            echo "| Swift Quality | ✅ |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.swift-quality.result }}" == "skipped" ]; then
            echo "| Swift Quality | ⏭️ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Swift Quality | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status (三版本)" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Lite | Standard | Pro |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|----------|-----|" >> $GITHUB_STEP_SUMMARY

          # Windows
          WIN_LITE="${{ needs.windows-build.result }}"
          echo "| Windows | $([[ "$WIN_LITE" == "success" ]] && echo "✅" || echo "❌") | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY

          # Linux
          LIN_LITE="${{ needs.linux-build.result }}"
          echo "| Linux | $([[ "$LIN_LITE" == "success" ]] && echo "✅" || echo "❌") | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY

          # macOS
          MAC_LITE="${{ needs.macos-build.result }}"
          echo "| macOS | $([[ "$MAC_LITE" == "success" ]] && echo "✅" || echo "❌") | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Tests & Security" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.core-tests.result }}" == "success" ]; then
            echo "| Core Tests (三版本) | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Core Tests | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.security-audit.result }}" == "success" ]; then
            echo "| Security Audit | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Security Audit | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.pro-server-build.result }}" == "success" ]; then
            echo "| Pro Server Build | ✅ |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.pro-server-build.result }}" == "skipped" ]; then
            echo "| Pro Server Build | ⏭️ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Pro Server Build | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status
          if [ "${{ needs.rust-quality.result }}" == "success" ] && \
             [ "${{ needs.core-tests.result }}" == "success" ] && \
             [ "${{ needs.windows-build.result }}" == "success" ] && \
             [ "${{ needs.linux-build.result }}" == "success" ]; then
            echo "## ✅ All Critical Checks Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "三版本 (Lite/Standard/Pro) 编译验证通过！" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Some Checks Failed" >> $GITHUB_STEP_SUMMARY
          fi
